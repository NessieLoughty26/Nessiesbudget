<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#fdf6f7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Nessie's Budget"/>
<title>Nessie's Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#fdf6f7;--surface:#ffffff;--border:#f2dde0;--border2:#f8eced;
  --pink:#c97a86;--pink-l:#faeaec;--pink-d:#8c4a54;--pink-m:#e8b8be;
  --mint:#8aada0;--mint-l:#dceee9;--mint-d:#3a6b5e;
  --red:#b84040;--red-l:#fae0e0;
  --amber:#b87830;--amber-l:#faecd8;
  --sky:#6090b0;--sky-l:#dceaf4;
  --lav:#9080b8;--lav-l:#ece8f8;
  --text:#3a2024;--muted:#906068;--dim:#d4aaB0;
  --shadow:0 2px 16px rgba(120,40,60,.07);
  --nav-h:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp .24s ease both}

/* ── HEADER ── */
#header{
  position:sticky;top:0;
  background:rgba(253,246,247,.95);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:14px 18px 12px;
  padding-top:calc(14px + env(safe-area-inset-top));
  border-bottom:1px solid var(--border);z-index:50;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.header-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--pink);letter-spacing:-.2px}
.header-sub{font-size:11px;color:var(--dim);font-weight:500;margin-top:1px}
.add-fab{
  width:42px;height:42px;background:var(--pink);color:white;border:none;border-radius:13px;
  font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(201,122,134,.32);transition:transform .13s;flex-shrink:0;
}
.add-fab:active{transform:scale(.91)}

/* ── NAV ── */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:50;
}
.nav-btn{
  flex:1;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:600;
  cursor:pointer;padding:3px 0;color:var(--dim);transition:color .18s;
}
.nav-btn.active{color:var(--pink)}
.nav-icon{font-size:19px;line-height:1.1}

/* ── CONTENT ── */
#content{padding:14px 14px 120px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
.card-flush{padding:0;overflow:hidden}
.serif{font-family:'DM Serif Display',serif}
.sec-label{font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;margin-top:4px}

/* ── FORMS ── */
input,select{
  background:var(--bg);border:1px solid var(--border);border-radius:11px;
  padding:10px 13px;color:var(--text);font-size:14px;font-weight:500;
  font-family:'DM Sans',sans-serif;width:100%;outline:none;
  transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(201,122,134,.1)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
label{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:11px;border:none;
  font-size:13.5px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .13s;white-space:nowrap;
}
.btn:active{transform:scale(.95)}
.btn-pink{background:var(--pink);color:white;box-shadow:0 4px 14px rgba(201,122,134,.22)}
.btn-mint{background:var(--mint);color:white;box-shadow:0 4px 14px rgba(138,173,160,.28)}
.btn-sky{background:var(--sky);color:white;box-shadow:0 4px 14px rgba(96,144,176,.22)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid rgba(184,64,64,.15)}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px}
.btn-full{width:100%}

/* ── PILLS ── */
.pill-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:99px;border:none;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s}
.pill-active{background:var(--pink);color:white;box-shadow:0 3px 10px rgba(201,122,134,.22)}
.pill-inactive{background:var(--surface);color:var(--muted);border:1px solid var(--border)}

/* ── PROGRESS BARS ── */
.bar-track{background:var(--border2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.34,1.2,.64,1)}

/* ── TILES ── */
.tile-row{display:flex;gap:8px;margin-bottom:12px}
.tile{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 11px;box-shadow:var(--shadow)}
.tile-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.tile-val{font-family:'DM Serif Display',serif;font-size:20px;line-height:1.1}

/* ── LIST ITEMS ── */
.list-item{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border2);transition:background .12s}
.list-item:last-child{border-bottom:none}
.item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--dim);font-weight:500;margin-top:1px}
.item-right{text-align:right;flex-shrink:0}
.item-amount{font-size:14px;font-weight:600}
.del-btn{background:none;border:none;color:var(--dim);font-size:19px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:color .13s,background .13s;flex-shrink:0;line-height:1}
.del-btn:active{color:var(--red);background:var(--red-l)}

/* ── CATEGORY CHIPS ── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:2px}
.cat-chip{padding:9px 4px;border-radius:11px;border:1.5px solid var(--border);background:var(--bg);text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s}
.cat-chip .ce{font-size:18px;display:block;margin-bottom:2px}
.cat-chip.sel{border-color:var(--pink);background:var(--pink-l);color:var(--pink-d)}

/* ── WALLET CARDS ── */
.wallet-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.wallet-row::-webkit-scrollbar{display:none}
.wallet-card{flex:0 0 auto;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px 13px 11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.wc-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.wc-val{font-family:'DM Serif Display',serif;font-size:21px;line-height:1;margin-bottom:2px}
.wc-sub{font-size:10px;font-weight:600;color:var(--dim)}

/* ── BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(58,32,36,.25);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.sheet{
  background:white;border-radius:22px 22px 0 0;border-top:1px solid var(--border);
  padding:0 18px;padding-bottom:calc(32px + env(safe-area-inset-bottom));
  width:100%;max-width:430px;max-height:92vh;overflow-y:auto;
  animation:slideUp .26s cubic-bezier(.34,1.2,.64,1) both;
  box-shadow:0 -8px 40px rgba(160,60,120,.14);
}
.sheet-handle{width:34px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 18px}
.sheet-title{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:16px;color:var(--text)}
.col{display:flex;flex-direction:column;gap:10px}
.row-2{display:flex;gap:8px;align-items:flex-end}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--nav-h) + 16px);left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(58,32,36,.18)}
#toast.show{opacity:1}

/* ── MISC ── */
.empty{text-align:center;color:var(--dim);padding:26px 16px;font-size:13.5px;font-weight:500}
.over-badge{display:inline-block;background:var(--red-l);color:var(--red);border-radius:99px;font-size:10.5px;font-weight:700;padding:2px 7px;margin-left:5px}
.ok-badge{display:inline-block;background:var(--mint-l);color:var(--mint-d);border-radius:99px;font-size:10.5px;font-weight:700;padding:2px 7px;margin-left:5px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--bg)}
.settings-label{font-size:14px;font-weight:600;color:var(--text)}
.settings-sub{font-size:11px;color:var(--dim);margin-top:1px;font-weight:500}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-nav button{background:none;border:1px solid var(--border);border-radius:9px;width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center}
.month-nav button:active{border-color:var(--pink);color:var(--pink)}
.month-label{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text)}
/* sticky add-button bar above nav */
.sticky-add{position:sticky;bottom:calc(var(--nav-h) + 8px);padding:8px 0 2px;background:var(--bg);z-index:10}
</style>
<script>
(function(){
  var c=document.createElement("canvas");c.width=180;c.height=180;
  var ctx=c.getContext("2d");
  ctx.fillStyle="#fdf6f7";ctx.beginPath();ctx.roundRect(0,0,180,180,36);ctx.fill();
  ctx.font="110px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("🌸",90,95);
  var link=document.createElement("link");link.rel="apple-touch-icon";link.href=c.toDataURL("image/png");
  document.head.appendChild(link);
})();
</script>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div class="header-title">Nessie's Budget</div>
      <div id="header-sub" class="header-sub"></div>
    </div>
    <button class="add-fab" id="fab" onclick="fabAction()">+</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="setView('expenses')" id="nav-expenses"><span class="nav-icon">🧾</span>Expenses</button>
    <button class="nav-btn" onclick="setView('budget')" id="nav-budget"><span class="nav-icon">🎯</span>Budget</button>
    <button class="nav-btn" onclick="setView('bills')" id="nav-bills"><span class="nav-icon">📋</span>Bills</button>
    <button class="nav-btn" onclick="setView('money')" id="nav-money"><span class="nav-icon">💰</span>Money</button>
    <button class="nav-btn" onclick="setView('settings')" id="nav-settings"><span class="nav-icon">⚙️</span>Settings</button>
  </nav>
</div>
<div id="toast"></div>

<script>
const STORE='nessie_budget_v3';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function defaultState(){return{expenses:[],income:[],categories:[],bills:[],savings:[],debts:[],wallet:[],lastBackup:null}}

let state;
function load(){
  try{
    const raw=localStorage.getItem(STORE);
    if(!raw){
      // migrate from v2
      const old=localStorage.getItem('nessie_budget_v2');
      if(old){const p=JSON.parse(old);state={...defaultState(),...p};if(!Array.isArray(state.income))state.income=[];save();return;}
    }
    state=raw?{...defaultState(),...JSON.parse(raw)}:defaultState();
    ['expenses','income','categories','bills','savings','debts','wallet'].forEach(k=>{if(!Array.isArray(state[k]))state[k]=[];});
  }catch{state=defaultState();}
}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}

let currentView='expenses';
let viewMonth,viewYear;
let _expPill='all';

// FAB label per view
const FAB_LABEL={'expenses':'+','budget':'+','bills':'+','money':'+','settings':null};
function fabAction(){
  if(currentView==='expenses')openQuickAdd();
  else if(currentView==='budget')openAddCat();
  else if(currentView==='bills')openAddBill();
  else if(currentView==='money')openMoneyAdd();
}

function setView(v){
  currentView=v;
  ['expenses','budget','bills','money','settings'].forEach(k=>{
    document.getElementById('nav-'+k)?.classList.toggle('active',k===v);
  });
  const fab=document.getElementById('fab');
  if(fab)fab.style.display=v==='settings'?'none':'flex';
  render();
}
function render(){
  const el=document.getElementById('content');
  if(currentView==='expenses')el.innerHTML=buildExpenses();
  else if(currentView==='budget')el.innerHTML=buildBudget();
  else if(currentView==='bills')el.innerHTML=buildBills();
  else if(currentView==='money')el.innerHTML=buildMoney();
  else if(currentView==='settings')el.innerHTML=buildSettings();
  el.scrollTop=0;
}

// ── EXPENSES ──
function buildExpenses(){
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const monthExps=state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const monthInc=state.income.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalExp=monthExps.reduce((s,e)=>s+e.amount,0);
  const totalInc=monthInc.reduce((s,e)=>s+e.amount,0);
  const balance=totalInc-totalExp;
  const bycat={};monthExps.forEach(e=>{bycat[e.catId]=(bycat[e.catId]||0)+e.amount;});
  const topCatId=Object.entries(bycat).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const topCat=state.categories.find(c=>c.id===topCatId);
  const prev=prevMo(m,y),next=nextMo(m,y);
  const isCur=m===now.getMonth()&&y===now.getFullYear();
  const isIncome=_expPill==='income';
  const filtered=isIncome?monthInc:(_expPill==='all'?monthExps:monthExps.filter(e=>e.catId===_expPill));
  const pillsHTML=`<div class="pill-row">
    <button class="pill ${_expPill==='all'?'pill-active':'pill-inactive'}" onclick="expPill('all')">All</button>
    <button class="pill ${isIncome?'pill-active':'pill-inactive'}" onclick="expPill('income')" style="${isIncome?'':'background:var(--mint-l);color:var(--mint-d);border-color:var(--mint-l)'}">💰 Income</button>
    ${state.categories.map(c=>`<button class="pill ${_expPill===c.id?'pill-active':'pill-inactive'}" onclick="expPill('${c.id}')">${c.emoji} ${c.name}</button>`).join('')}
  </div>`;
  const listHTML=filtered.length===0
    ?`<div class="empty">${isIncome?'No income logged yet ✨':'No expenses yet ✨'}</div>`
    :filtered.map(e=>{
        if(isIncome){
          const w=state.wallet.find(x=>x.id===e.walletId);
          return`<div class="list-item">
            <div class="item-icon" style="background:var(--mint-l)">💰</div>
            <div class="item-info"><div class="item-name">${esc(e.name)}</div><div class="item-sub">Income · ${fmtDate(e.date)}${w?' · '+esc(w.name):''}</div></div>
            <div class="item-right"><div class="item-amount" style="color:var(--mint-d)">+CHF ${fmt(e.amount)}</div></div>
            <button class="del-btn" onclick="deleteIncome('${e.id}')">×</button>
          </div>`;
        }
        const cat=state.categories.find(c=>c.id===e.catId)||{emoji:'❓',name:'Other',color:'#f0dff0'};
        return`<div class="list-item">
          <div class="item-icon" style="background:${cat.color}">${cat.emoji}</div>
          <div class="item-info"><div class="item-name">${esc(e.name)}</div><div class="item-sub">${esc(cat.name)} · ${fmtDate(e.date)}</div></div>
          <div class="item-right"><div class="item-amount" style="color:var(--pink)">−CHF ${fmt(e.amount)}</div></div>
          <button class="del-btn" onclick="deleteExpense('${e.id}')">×</button>
        </div>`;
      }).join('');
  return`<div class="fade-up">
    <div class="month-nav">
      <button onclick="navMonth(${prev.m},${prev.y})">‹</button>
      <span class="month-label">${MONTHS[m]} ${y}</span>
      <button onclick="navMonth(${next.m},${next.y})" ${isCur?'style="opacity:.25;pointer-events:none"':''}>›</button>
    </div>
    <div class="tile-row">
      <div class="tile"><div class="tile-label">Income</div><div class="tile-val" style="color:var(--mint-d)">CHF ${fmt(totalInc)}</div></div>
      <div class="tile"><div class="tile-label">Spent</div><div class="tile-val" style="color:var(--pink)">CHF ${fmt(totalExp)}</div></div>
      <div class="tile"><div class="tile-label" style="color:${balance<0?'var(--red)':'var(--dim)'}">${balance>=0?'Left':'Over'}</div><div class="tile-val" style="color:${balance>=0?'var(--mint-d)':'var(--red)'}">CHF ${fmt(Math.abs(balance))}</div></div>
    </div>
    ${pillsHTML}
    <div class="card card-flush">${listHTML}</div>
    ${state.categories.length===0?`<div class="card" style="text-align:center;padding:16px;color:var(--muted);font-size:13px;line-height:1.6">Set up categories in the <b>Budget</b> tab first 🌸</div>`:''}
  </div>`;
}
function expPill(id){_expPill=id;render();}
function navMonth(m,y){viewMonth=m;viewYear=y;render();}
function deleteExpense(id){
  const e=state.expenses.find(x=>x.id===id);
  if(e&&e.walletId){const w=state.wallet.find(x=>x.id===e.walletId);if(w)w.balance=Math.round((w.balance+e.amount)*100)/100;}
  state.expenses=state.expenses.filter(x=>x.id!==id);
  save();render();toast('Removed');
}
function deleteIncome(id){
  const inc=state.income.find(x=>x.id===id);
  if(inc&&inc.walletId){const w=state.wallet.find(x=>x.id===inc.walletId);if(w)w.balance=Math.round((w.balance-inc.amount)*100)/100;}
  state.income=state.income.filter(x=>x.id!==id);
  save();render();toast('Removed');
}

// ── BUDGET ──
function buildBudget(){
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const monthExps=state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;});
  const cats=state.categories;
  const totalBudget=cats.reduce((s,c)=>s+(c.limit||0),0);
  const totalSpent=monthExps.reduce((s,e)=>s+e.amount,0);
  const catsHTML=cats.length===0
    ?`<div class="empty">No categories yet — tap + to add ✨</div>`
    :cats.map(c=>{
      const spent=monthExps.filter(e=>e.catId===c.id).reduce((s,e)=>s+e.amount,0);
      const limit=c.limit||0;
      const pct=limit>0?Math.min(100,Math.round(spent/limit*100)):0;
      const over=limit>0&&spent>limit;
      const barColor=over?'var(--red)':pct>80?'var(--amber)':c.accent;
      return`<div class="card" style="padding:13px 15px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${limit>0?'10':'4'}px">
          <div style="width:34px;height:34px;border-radius:10px;background:${c.color};display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${c.emoji}</div>

function deleteCat(id){
  if(state.expenses.some(e=>e.catId===id)){toast('Remove related expenses first');return;}

}

// ── BILLS ──
function buildBills(){
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const key=`${y}-${m}`;
  const prev=prevMo(m,y),next=nextMo(m,y);
  const isCur=m===now.getMonth()&&y===now.getFullYear();
  const activeBills=state.bills.filter(b=>b.active);
  const billsThisMonth=activeBills.filter(b=>{
    if(b.recurrence==='once'&&b.onceDate){const d=new Date(b.onceDate);return d.getMonth()===m&&d.getFullYear()===y;}
    if(b.recurrence==='yearly'&&b.yearMonth!==undefined){return b.yearMonth===m;}
    return b.recurrence!=='once';
  });
  const monthlyTotal=billsThisMonth.reduce((s,b)=>s+b.amount,0);
  const paidBills=billsThisMonth.filter(b=>(b.paidMonths||[]).includes(key));
  const unpaidBills=billsThisMonth.filter(b=>!(b.paidMonths||[]).includes(key));
  const billItem=(b,isPaid)=>{
    const cat=state.categories.find(c=>c.id===b.catId)||{emoji:'📋',color:'#f0dff0'};
    const recLabel={monthly:'Monthly',weekly:'Weekly',yearly:'Yearly',once:'One-time'}[b.recurrence]||'Monthly';
    let dueSub='';
    if(b.recurrence==='once'&&b.onceDate){dueSub=' · '+fmtDateStr(b.onceDate);}
    else if(b.dueDay){dueSub=` · Due ${b.dueDay}${ord(b.dueDay)}`;}
    return`<div class="list-item">
      <div class="item-icon" style="background:${isPaid?'var(--mint-l)':cat.color}">${isPaid?'✓':cat.emoji}</div>
      <div class="item-info">
        <div class="item-name">${esc(b.name)}</div>
        <div class="item-sub">${recLabel}${dueSub}</div>
      </div>
      <div class="item-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="item-amount" style="color:${isPaid?'var(--dim)':'var(--text)'};${isPaid?'text-decoration:line-through':''}">CHF ${fmt(b.amount)}</div>
        ${!isPaid
          ?`<button class="btn btn-sm btn-mint" onclick="openPayBill('${b.id}')">Pay</button>`
          :`<button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="unpayBill('${b.id}','${key}')">Undo</button>`}
      </div>
      <button class="del-btn" onclick="deleteBill('${b.id}')">×</button>
    </div>`;
  };
  const allBillsTotal=activeBills.filter(b=>b.recurrence==='monthly').reduce((s,b)=>s+b.amount,0);
  return`<div class="fade-up">
    <div class="month-nav">
      <button onclick="navMonth(${prev.m},${prev.y})">‹</button>
      <span class="month-label">${MONTHS[m]} ${y}</span>
      <button onclick="navMonth(${next.m},${next.y})" ${isCur?'style="opacity:.25;pointer-events:none"':''}>›</button>
    </div>
    <div class="tile-row">
      <div class="tile"><div class="tile-label">This month</div><div class="tile-val" style="color:var(--muted)">CHF ${fmt(monthlyTotal)}</div></div>
      <div class="tile"><div class="tile-label">Paid</div><div class="tile-val" style="color:var(--mint-d)">${paidBills.length}</div></div>
      <div class="tile"><div class="tile-label">Due</div><div class="tile-val" style="color:${unpaidBills.length>0?'var(--pink)':'var(--dim)'}">${unpaidBills.length}</div></div>
    </div>
    ${unpaidBills.length>0?`<div class="sec-label">To pay</div><div class="card card-flush">${unpaidBills.map(b=>billItem(b,false)).join('')}</div>`:''}
    ${paidBills.length>0?`<div class="sec-label" style="margin-top:12px">Paid ✓</div><div class="card card-flush">${paidBills.map(b=>billItem(b,true)).join('')}</div>`:''}
    ${state.bills.length===0?`<div class="empty">No bills yet — tap + to add ✨</div>`:''}
    ${unpaidBills.length===0&&paidBills.length===0&&state.bills.length>0?`<div class="empty">No bills this month 🌸</div>`:''}
  </div>`;
}
function deleteBill(id){state.bills=state.bills.filter(b=>b.id!==id);save();render();toast('Bill removed');}
function unpayBill(id,key){
  const b=state.bills.find(x=>x.id===id);if(!b)return;
  // reverse wallet deduction
  const exp=state.expenses.find(e=>e.billId===id&&e.billKey===key);
  if(exp&&exp.walletId){const w=state.wallet.find(x=>x.id===exp.walletId);if(w)w.balance=Math.round((w.balance+exp.amount)*100)/100;}
  b.paidMonths=(b.paidMonths||[]).filter(k=>k!==key);
  state.expenses=state.expenses.filter(e=>!(e.billId===id&&e.billKey===key));
  save();render();toast('Marked unpaid');
}

// ── MONEY ──
function buildMoney(){
  const wallet=state.wallet;
  const liquidTotal=wallet.filter(w=>w.type==='bank'||w.type==='cash').reduce((s,w)=>s+w.balance,0);
  const cardDebt=wallet.filter(w=>w.type==='card'&&w.balance<0).reduce((s,w)=>s+Math.abs(w.balance),0);
  const net=liquidTotal-cardDebt;
  const walletHTML=wallet.length===0
    ?`<div class="empty" style="padding:14px">Add your accounts 🏦</div>`
    :wallet.map(w=>{
      const isNeg=w.balance<0;

      const textMap={bank:'var(--sky)',cash:'var(--mint-d)',card:'var(--lav)'};
      return`<div class="wallet-card">
        <div style="position:absolute;top:0;right:0;width:48px;height:48px;background:${bgMap[w.type]||'var(--pink-l)'};border-radius:0 16px 0 36px;opacity:.5"></div>
        <div class="wc-label">${esc(w.name)}</div>
        <div class="wc-val" style="color:${isNeg?'var(--red)':textMap[w.type]||'var(--text)'}">CHF ${fmt(w.balance)}</div>

        <div style="display:flex;gap:5px;margin-top:8px">
          <button onclick="openAddIncome('${w.id}')" style="flex:1;background:var(--mint-l);color:var(--mint-d);border:none;border-radius:8px;font-size:11px;font-weight:700;padding:5px 4px;cursor:pointer">+In</button>
          <button onclick="openEditWallet('${w.id}')" style="flex:1;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:700;padding:5px 4px;cursor:pointer">Edit</button>
        </div>
      </div>`;
    }).join('');
  const savings=state.savings;
  const savHTML=savings.length===0
    ?`<div class="empty" style="padding:12px">No goals yet 🌱</div>`
    :savings.map(g=>{
      const pct=g.goal>0?Math.min(100,Math.round(g.saved/g.goal*100)):0;
      return`<div class="card" style="padding:13px 15px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-size:14px;font-weight:600">${esc(g.name)}</div><div style="font-size:11px;color:var(--dim);margin-top:1px">CHF ${fmt(g.saved)} of CHF ${fmt(g.goal)}</div></div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:13px;font-weight:700;color:var(--mint-d)">${pct}%</span>
            <button class="btn btn-sm" onclick="openAddToSavings('${g.id}')" style="background:var(--mint-l);color:var(--mint-d);border:none">+ Add</button>
            <button class="del-btn" onclick="deleteSavings('${g.id}')">×</button>
          </div>
        </div>
        <div class="bar-track" style="height:5px"><div class="bar-fill" style="width:${pct}%;background:var(--mint)"></div></div>
        <div style="font-size:11px;color:var(--dim);margin-top:5px">${g.goal-g.saved>0?`CHF ${fmt(Math.max(0,g.goal-g.saved))} to go`:'🎉 Goal reached!'}</div>
      </div>`;
    }).join('');
  const manualDebts=state.debts;
  const cardDebts=wallet.filter(w=>w.type==='card'&&w.balance<0).map(w=>({id:'_c_'+w.id,name:w.name,total:Math.abs(w.balance),paid:0,isCard:true,walletId:w.id}));
  const allDebts=[...manualDebts,...cardDebts];
  const debtHTML=allDebts.length===0
    ?`<div class="empty" style="padding:12px">No debts — nice! 🎉</div>`
    :allDebts.map(d=>{
      const pct=d.total>0?Math.min(100,Math.round(d.paid/d.total*100)):0;
      const rem=Math.max(0,d.total-d.paid);
      return`<div class="card" style="padding:13px 15px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:14px;font-weight:600">${esc(d.name)}${d.isCard?`<span style="font-size:10px;color:var(--lav);background:var(--lav-l);border-radius:99px;padding:2px 7px;margin-left:5px;font-weight:700">card</span>`:''}</div>
            <div style="font-size:11px;color:var(--dim);margin-top:1px">CHF ${fmt(rem)} remaining</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:13px;font-weight:700;color:var(--red)">CHF ${fmt(d.total)}</span>
            ${!d.isCard
              ?`<button class="btn btn-sm btn-danger" onclick="openPayDebt('${d.id}')">Pay</button><button class="del-btn" onclick="deleteDebt('${d.id}')">×</button>`
              :`<button class="btn btn-sm btn-ghost" onclick="openEditWallet('${d.walletId}')">Edit</button>`}
          </div>
        </div>
        <div class="bar-track" style="height:5px"><div class="bar-fill" style="width:${pct}%;background:var(--red)"></div></div>
        <div style="font-size:11px;color:var(--dim);margin-top:5px">${pct}% paid off</div>
      </div>`;
    }).join('');
  return`<div class="fade-up">
    <div class="sec-label">Accounts</div>
    <div class="wallet-row">${walletHTML}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="openAddWallet()">+ Account</button>
      ${wallet.length>0?`<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:8px 13px;font-size:12px;color:var(--muted);font-weight:500">Net worth: <b style="color:${net>=0?'var(--mint-d)':'var(--red)'}">CHF ${fmt(net)}</b></div>`:''}
    </div>
    <div class="sec-label">Savings goals</div>
    ${savHTML}
    <button class="btn btn-mint btn-full btn-sm" onclick="openAddSavingsGoal()" style="margin-bottom:16px">+ New goal</button>
    <div class="sec-label">Debts</div>
    ${debtHTML}
    <button class="btn btn-danger btn-full btn-sm" onclick="openAddDebt()">+ Add debt</button>
  </div>`;
}
function deleteSavings(id){state.savings=state.savings.filter(g=>g.id!==id);save();render();toast('Goal removed');}
function deleteDebt(id){state.debts=state.debts.filter(d=>d.id!==id);save();render();toast('Debt removed');}

// ── SETTINGS ──
function buildSettings(){
  const days=backupDaysAgo();
  const sub=days===null?'Never backed up yet':days===0?'Backed up today':'Last backup: '+days+' day'+(days===1?'':'s')+' ago';
  return`<div class="fade-up">
    <div class="card card-flush" style="margin-bottom:14px">
      <div class="settings-row" onclick="exportData()">
        <div><div class="settings-label">💾 Backup data</div><div class="settings-sub">${sub}</div></div><span style="color:var(--dim)">›</span>
      </div>
      <div class="settings-row" onclick="importData()">
        <div><div class="settings-label">📥 Restore backup</div><div class="settings-sub">Load a .json backup file</div></div><span style="color:var(--dim)">›</span>
      </div>
      <div class="settings-row" onclick="confirmReset()">
        <div><div class="settings-label" style="color:var(--red)">🗑️ Reset all data</div><div class="settings-sub">Wipe everything and start fresh</div></div><span style="color:var(--dim)">›</span>
      </div>
    </div>
    <div class="card" style="background:var(--pink-l);border-color:var(--pink-m)">
      <div style="font-size:13px;font-weight:600;color:var(--pink-d);margin-bottom:4px">About Nessie's Budget</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7">All data lives only on your phone — nothing is ever sent anywhere. Back up regularly to stay safe 🌸</div>
    </div>
  </div>`;
}
function backupDaysAgo(){
  if(!state.lastBackup)return null;
  return Math.floor((new Date()-new Date(state.lastBackup))/(1000*60*60*24));
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='nessie-budget-'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  state.lastBackup=todayStr();save();render();toast('Backup saved 💾');
}
function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imp=JSON.parse(ev.target.result);
        if(!imp.expenses){toast('⚠️ Invalid file');return;}
        openConfirm('Restore backup?','This replaces ALL current data.','Yes, restore',()=>{
          state={...defaultState(),...imp};
          ['expenses','income','categories','bills','savings','debts','wallet'].forEach(k=>{if(!Array.isArray(state[k]))state[k]=[];});
          save();toast('Data restored ✓');setView('expenses');
        });
      }catch{toast('⚠️ Could not read file');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}
function confirmReset(){
  openConfirm('Reset everything?','This permanently deletes all data. Make a backup first!','Yes, reset',()=>{
    state=defaultState();save();toast('Data reset');setView('expenses');
  });
}

function saveIncome(){
  const name=document.getElementById('inc-name')?.value.trim();
  const amount=parseFloat(document.getElementById('inc-amount')?.value);
  const date=document.getElementById('inc-date')?.value;
  const walletId=document.getElementById('inc-wallet')?.value||'';
  if(!name){toast('Enter a description');return;}
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  if(!date){toast('Pick a date');return;}
  state.income.push({id:uid(),date,name,amount,walletId:walletId||null});
  if(walletId){const w=state.wallet.find(x=>x.id===walletId);if(w)w.balance=Math.round((w.balance+amount)*100)/100;}
  save();closeSheet();render();toast('Income saved ✓');
}

function saveBill(){
  const name=document.getElementById('bl-name')?.value.trim();
  const amount=parseFloat(document.getElementById('bl-amount')?.value);
  const rec=document.getElementById('bl-rec')?.value||'monthly';
  const day=parseInt(document.getElementById('bl-day')?.value)||null;
  const onceDate=rec==='once'?(document.getElementById('bl-date')?.value||null):null;
  const catId=document.getElementById('bl-cat')?.value||null;
  if(!name){toast('Enter a name');return;}
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  if(rec==='once'&&!onceDate){toast('Pick a date');return;}
  const yearMonth=rec==='yearly'&&day?new Date(onceDate||todayStr()).getMonth():null;
  state.bills.push({id:uid(),name,amount,recurrence:rec,dueDay:day,onceDate,yearMonth,catId,active:true,paidMonths:[]});
  save();closeSheet();render();toast('Bill added ✓');
}
function openPayBill(id){
  const b=state.bills.find(x=>x.id===id);if(!b)return;
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const key=`${y}-${m}`;
  const walletOpts=state.wallet.map(w=>`<option value="${w.id}">${{bank:'🏦',cash:'💵',card:'💳'}[w.type]||'💰'} ${esc(w.name)} · CHF ${fmt(w.balance)}</option>`).join('');
  openSheet(`
    <div class="sheet-title">Pay "${esc(b.name)}"</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Estimated: <b>CHF ${fmt(b.amount)}</b> — adjust if actual amount differs.</div>
    <div class="col">
      <div><label>Actual amount (CHF)</label><input id="bp-amount" type="number" value="${b.amount}" step="0.01" min="0"/></div>
      ${walletOpts?`<div><label>Deduct from account</label><select id="bp-wallet"><option value="">— don't deduct —</option>${walletOpts}</select></div>`:''}
      <button class="btn btn-mint btn-full" onclick="confirmPayBill('${id}','${key}')" style="margin-top:4px">Mark as paid ✓</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function confirmPayBill(id,key){
  const b=state.bills.find(x=>x.id===id);if(!b)return;
  const amount=parseFloat(document.getElementById('bp-amount')?.value)||b.amount;
  const walletId=document.getElementById('bp-wallet')?.value||'';
  if(walletId){const w=state.wallet.find(x=>x.id===walletId);if(w)w.balance=Math.round((w.balance-amount)*100)/100;}
  if(!b.paidMonths)b.paidMonths=[];
  b.paidMonths.push(key);
  const alreadyLogged=state.expenses.some(e=>e.billId===id&&e.billKey===key);
  if(!alreadyLogged&&b.catId){
    const [yr,mo]=key.split('-').map(Number);
    const now=new Date();
    const expDate=(mo===now.getMonth()&&yr===now.getFullYear())?todayStr():`${yr}-${String(mo+1).padStart(2,'0')}-01`;
    state.expenses.push({id:uid(),date:expDate,name:b.name,amount,catId:b.catId,billId:id,billKey:key,walletId:walletId||null});
  }
  save();closeSheet();render();toast('Bill paid ✓');
}

let _sheetEl=null;

  closeSheet();

  _sheetEl.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>${html}</div>`;
  document.body.appendChild(_sheetEl);
}
function closeSheet(){if(_sheetEl){_sheetEl.remove();_sheetEl=null;}}

// ── UTILS ──
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmt(n){return Number(n).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(dateStr){return new Date(dateStr).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtDateStr(dateStr){return new Date(dateStr).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function prevMo(m,y){return m===0?{m:11,y:y-1}:{m:m-1,y};}
function nextMo(m,y){return m===11?{m:0,y:y+1}:{m:m+1,y};}
function ord(n){const s=['th','st','nd','rd'];const v=n%100;return s[(v-20)%10]||s[v]||s[0];}
let _toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}
