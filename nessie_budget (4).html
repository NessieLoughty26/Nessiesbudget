<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#fdf6f7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Nessie's Budget"/>
<title>Nessie's Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#fdf6f7; --surface:#ffffff; --border:#f2dde0; --border2:#f8eced;
  --pink:#c97a86; --pink-l:#faeaec; --pink-d:#8c4a54; --pink-m:#e8b8be;
  --mint:#8aada0; --mint-l:#dceee9; --mint-d:#3a6b5e;
  --red:#b84040; --red-l:#fae0e0;
  --amber:#b87830; --amber-l:#faecd8;
  --sky:#6090b0; --sky-l:#dceaf4;
  --lav:#9080b8; --lav-l:#ece8f8;
  --text:#3a2024; --muted:#906068; --dim:#d4aaB0;
  --shadow:0 2px 16px rgba(120,40,60,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
::-webkit-scrollbar{width:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(56px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp .26s ease both}
.fade-up-2{animation:fadeUp .26s .06s ease both}

#header{
  position:sticky;top:0;
  background:rgba(253,246,247,.93);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  padding:14px 18px 12px;
  padding-top:calc(14px + env(safe-area-inset-top));
  border-bottom:1px solid var(--border);z-index:50;
  display:flex;justify-content:space-between;align-items:center;
}
.header-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--pink);letter-spacing:-.2px}
.header-sub{font-size:11px;color:var(--dim);font-weight:500;margin-top:1px}
.add-fab{
  width:42px;height:42px;background:var(--pink);color:white;border:none;border-radius:13px;
  font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(201,122,134,.32);transition:transform .13s;flex-shrink:0;
}
.add-fab:active{transform:scale(.91)}

#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:flex;padding:9px 0;
  padding-bottom:calc(9px + env(safe-area-inset-bottom));z-index:50;
}
.nav-btn{
  flex:1;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:600;
  cursor:pointer;padding:3px 0;color:var(--dim);transition:color .18s;
}
.nav-btn.active{color:var(--pink)}
.nav-icon{font-size:19px;line-height:1.1}

#content{padding:16px 14px 100px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
.card-flush{padding:0;overflow:hidden}

.serif{font-family:'DM Serif Display',serif}
.sec-label{font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}

input,select{
  background:var(--bg);border:1px solid var(--border);border-radius:11px;
  padding:10px 13px;color:var(--text);font-size:14px;font-weight:500;
  font-family:'DM Sans',sans-serif;width:100%;outline:none;
  transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(201,122,134,.1)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
label{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:11px;border:none;
  font-size:13.5px;font-weight:600;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all .13s;white-space:nowrap;
}
.btn:active{transform:scale(.95)}
.btn-pink{background:var(--pink);color:white;box-shadow:0 4px 14px rgba(201,122,134,.22)}
.btn-mint{background:var(--mint);color:white;box-shadow:0 4px 14px rgba(138,173,160,.28)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid rgba(184,64,64,.15)}
.btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px}
.btn-full{width:100%}

.pill-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:99px;border:none;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s}
.pill-active{background:var(--pink);color:white;box-shadow:0 3px 10px rgba(201,122,134,.22)}
.pill-inactive{background:var(--surface);color:var(--muted);border:1px solid var(--border)}

.bar-track{background:var(--border2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.34,1.2,.64,1)}

.tile-row{display:flex;gap:8px;margin-bottom:12px}
.tile{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 11px;box-shadow:var(--shadow)}
.tile-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.tile-val{font-family:'DM Serif Display',serif;font-size:20px;line-height:1.1}

.list-item{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--border2);transition:background .12s}
.list-item:last-child{border-bottom:none}
.item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:11px;color:var(--dim);font-weight:500;margin-top:1px}
.item-right{text-align:right;flex-shrink:0}
.item-amount{font-size:14px;font-weight:600;color:var(--text)}
.del-btn{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:color .13s,background .13s;flex-shrink:0;line-height:1}
.del-btn:hover{color:var(--red);background:var(--red-l)}

.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:2px}
.cat-chip{padding:9px 4px;border-radius:11px;border:1.5px solid var(--border);background:var(--bg);text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s}
.cat-chip .ce{font-size:18px;display:block;margin-bottom:2px}
.cat-chip.sel{border-color:var(--pink);background:var(--pink-l);color:var(--pink-d)}

.wallet-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.wallet-row::-webkit-scrollbar{display:none}
.wallet-card{flex:0 0 auto;min-width:130px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px 13px 11px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.wc-label{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.wc-val{font-family:'DM Serif Display',serif;font-size:21px;line-height:1;margin-bottom:2px}
.wc-sub{font-size:10px;font-weight:600;color:var(--dim)}

.overlay{position:fixed;inset:0;background:rgba(58,32,36,.22);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.sheet{background:white;border-radius:22px 22px 0 0;border-top:1px solid var(--border);padding:0 18px 50px;width:100%;max-width:430px;max-height:91vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.2,.64,1) both;box-shadow:0 -8px 40px rgba(160,60,120,.14)}
.sheet-handle{width:34px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 18px}
.sheet-title{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:16px;color:var(--text)}
.col{display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:8px;align-items:flex-end}

#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(58,32,36,.18)}
#toast.show{opacity:1}

.empty{text-align:center;color:var(--dim);padding:26px 16px;font-size:13.5px;font-weight:500}
.over-badge{display:inline-block;background:var(--red-l);color:var(--red);border-radius:99px;font-size:10.5px;font-weight:700;padding:2px 7px;margin-left:5px}
.ok-badge{display:inline-block;background:var(--mint-l);color:var(--mint-d);border-radius:99px;font-size:10.5px;font-weight:700;padding:2px 7px;margin-left:5px}

.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--bg)}
.settings-label{font-size:14px;font-weight:600;color:var(--text)}
.settings-sub{font-size:11px;color:var(--dim);margin-top:1px;font-weight:500}

.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-nav button{background:none;border:1px solid var(--border);border-radius:9px;width:30px;height:30px;font-size:15px;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{border-color:var(--pink);color:var(--pink)}
.month-label{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text)}
</style>
<script>
(function(){
  var c=document.createElement("canvas");
  c.width=180;c.height=180;
  var ctx=c.getContext("2d");
  ctx.fillStyle="#fdf6f7";
  ctx.beginPath();
  ctx.roundRect(0,0,180,180,36);
  ctx.fill();
  ctx.font="110px serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("🌸",90,95);
  var link=document.createElement("link");
  link.rel="apple-touch-icon";
  link.href=c.toDataURL("image/png");
  document.head.appendChild(link);
})();
</script>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div class="header-title">Nessie's Budget</div>
      <div id="header-sub" class="header-sub"></div>
    </div>
    <button class="add-fab" onclick="openQuickAdd()">+</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="setView('expenses')" id="nav-expenses"><span class="nav-icon">🧾</span>Expenses</button>
    <button class="nav-btn" onclick="setView('budget')" id="nav-budget"><span class="nav-icon">🎯</span>Budget</button>
    <button class="nav-btn" onclick="setView('bills')" id="nav-bills"><span class="nav-icon">📋</span>Bills</button>
    <button class="nav-btn" onclick="setView('money')" id="nav-money"><span class="nav-icon">💰</span>Money</button>
    <button class="nav-btn" onclick="setView('settings')" id="nav-settings"><span class="nav-icon">⚙️</span>Settings</button>
  </nav>
</div>
<div id="toast"></div>

<script>
const STORE='nessie_budget_v2';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function defaultState(){return{expenses:[],categories:[],bills:[],savings:[],debts:[],wallet:[],incomeEntries:[],lastBackup:null}}

let state;
function load(){
  try{
    const raw=localStorage.getItem(STORE);
    state=raw?{...defaultState(),...JSON.parse(raw)}:defaultState();
    ['expenses','categories','bills','savings','debts','wallet'].forEach(k=>{if(!Array.isArray(state[k]))state[k]=[];});if(!Array.isArray(state.incomeEntries))state.incomeEntries=[];;
  }catch{state=defaultState();}
}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}

let currentView='expenses';
let viewMonth,viewYear;
let _expPill='all';

function setView(v){
  currentView=v;
  ['expenses','budget','bills','money','settings'].forEach(k=>{
    document.getElementById('nav-'+k)?.classList.toggle('active',k===v);
  });
  render();
}
function render(){
  const el=document.getElementById('content');
  if(currentView==='expenses')el.innerHTML=buildExpenses();
  else if(currentView==='budget')el.innerHTML=buildBudget();
  else if(currentView==='bills')el.innerHTML=buildBills();
  else if(currentView==='money')el.innerHTML=buildMoney();
  else if(currentView==='settings')el.innerHTML=buildSettings();
}

// ── EXPENSES ──
function buildExpenses(){
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const monthExps=state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const monthInc=(state.incomeEntries||[]).filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;});
  const totalIncome=monthInc.reduce((s,e)=>s+e.amount,0);
  const total=monthExps.reduce((s,e)=>s+e.amount,0);
  const bycat={};monthExps.forEach(e=>{bycat[e.catId]=(bycat[e.catId]||0)+e.amount;});
  const topCatId=Object.entries(bycat).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const topCat=state.categories.find(c=>c.id===topCatId);
  const prev=prevMo(m,y),next=nextMo(m,y);
  const isCur=m===now.getMonth()&&y===now.getFullYear();
  // Wallet total = live available money across all non-card accounts + cards
  const walletTotal=state.wallet.reduce((s,w)=>s+w.balance,0);
  const liquidTotal=state.wallet.filter(w=>w.type==='bank'||w.type==='cash').reduce((s,w)=>s+w.balance,0);
  const filtered=_expPill==='all'?monthExps:monthExps.filter(e=>e.catId===_expPill);
  const pillsHTML=state.categories.length?`<div class="pill-row">
    <button class="pill ${_expPill==='all'?'pill-active':'pill-inactive'}" onclick="expPill('all')">All</button>
    ${state.categories.map(c=>`<button class="pill ${_expPill===c.id?'pill-active':'pill-inactive'}" onclick="expPill('${c.id}')">${c.emoji} ${c.name}</button>`).join('')}
  </div>`:'';
  const incListHTML=(_expPill==='all'&&monthInc.length>0)?monthInc.map(e=>{
    const d=new Date(e.date);
    return`<div class="list-item">
      <div class="item-icon" style="background:var(--mint-l)">💰</div>
      <div class="item-info"><div class="item-name">${esc(e.name)}</div><div class="item-sub">Income · ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div></div>
      <div class="item-right"><div class="item-amount" style="color:var(--mint-d)">+CHF ${fmt(e.amount)}</div></div>
      <button class="del-btn" onclick="deleteIncome('${e.id}')">×</button>
    </div>`;
  }).join(''):'';
  const listHTML=filtered.length===0&&!incListHTML
    ?`<div class="empty">${monthExps.length===0?'No transactions yet ✨':'Nothing in this category'}</div>`
    :filtered.map(e=>{
      const cat=state.categories.find(c=>c.id===e.catId)||{emoji:'❓',name:'Other',color:'#f0dff0'};
      const d=new Date(e.date);
      return`<div class="list-item">
        <div class="item-icon" style="background:${cat.color}">${cat.emoji}</div>
        <div class="item-info"><div class="item-name">${esc(e.name)}</div><div class="item-sub">${esc(cat.name)} · ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div></div>
        <div class="item-right"><div class="item-amount">CHF ${fmt(e.amount)}</div></div>
        <button class="del-btn" onclick="deleteExpense('${e.id}')">×</button>
      </div>`;
    }).join('');
  return`<div class="fade-up">
    <div class="month-nav">
      <button onclick="navMonth(${prev.m},${prev.y})">‹</button>
      <span class="month-label">${MONTHS[m]} ${y}</span>
      <button onclick="navMonth(${next.m},${next.y})" ${isCur?'style="opacity:.2;pointer-events:none"':''}>›</button>
    </div>
    ${isCur?`
    <div class="card fade-up" style="padding:13px 16px;margin-bottom:12px;background:${liquidTotal-total>=0?'var(--mint-l)':'var(--red-l)'};border-color:${liquidTotal-total>=0?'var(--mint)':'var(--red)'}44">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:${liquidTotal-total>=0?'var(--mint-d)':'var(--red)'};margin-bottom:3px">Available now</div>
          <div style="font-family:'DM Serif Display',serif;font-size:30px;line-height:1;color:${liquidTotal-total>=0?'var(--mint-d)':'var(--red)'}">${liquidTotal>=0?'CHF '+fmt(liquidTotal):'CHF '+fmt(liquidTotal)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;font-weight:500">across your bank & cash accounts</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:2px">Spent this month</div>
          <div style="font-size:18px;font-weight:600;color:var(--pink)">−CHF ${fmt(total)}</div>
          ${totalIncome>0?`<div style="font-size:10px;color:var(--mint-d);font-weight:600;margin-top:2px">+CHF ${fmt(totalIncome)} income</div>`:''}
        </div>
      </div>
    </div>`:`
    <div class="tile-row fade-up">
      <div class="tile"><div class="tile-label">Income</div><div class="tile-val" style="color:var(--mint-d)">${totalIncome>0?'CHF '+fmt(totalIncome):'—'}</div></div>
      <div class="tile"><div class="tile-label">Spent</div><div class="tile-val" style="color:var(--pink)">CHF ${fmt(total)}</div></div>
      <div class="tile"><div class="tile-label">${totalIncome>0?(total>totalIncome?'Over':'Left'):'Transactions'}</div><div class="tile-val" style="color:${totalIncome>0?(total>totalIncome?'var(--red)':'var(--mint)'):'var(--muted)'};">${totalIncome>0?'CHF '+fmt(Math.abs(totalIncome-total)):monthExps.length}</div></div>
    </div>`}
    ${pillsHTML}
    <div class="card card-flush fade-up-2">${incListHTML}${listHTML}</div>
    ${state.categories.length===0?'<div class="card" style="text-align:center;padding:16px;color:var(--muted);font-size:13px;line-height:1.6">Set up categories in the <b>Budget</b> tab first, then come back to log expenses 🌸</div>':''}
  </div>`;
}
function expPill(id){_expPill=id;render();}
function navMonth(m,y){viewMonth=m;viewYear=y;render();}
function deleteExpense(id){state.expenses=state.expenses.filter(e=>e.id!==id);save();render();toast('Removed');}
function deleteIncome(id){state.incomeEntries=(state.incomeEntries||[]).filter(e=>e.id!==id);save();render();toast('Removed');}

// ── BUDGET ──
function buildBudget(){
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const monthExps=state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;});
  const cats=state.categories;
  const totalBudget=cats.reduce((s,c)=>s+(c.limit||0),0);
  const totalSpent=monthExps.reduce((s,e)=>s+e.amount,0);
  const catsHTML=cats.length===0
    ?`<div class="empty">No categories yet — add yours below ✨</div>`
    :cats.map(c=>{
      const spent=monthExps.filter(e=>e.catId===c.id).reduce((s,e)=>s+e.amount,0);
      const limit=c.limit||0;
      const pct=limit>0?Math.min(100,Math.round(spent/limit*100)):0;
      const over=limit>0&&spent>limit;
      const barColor=over?'var(--red)':pct>80?'var(--amber)':c.accent;
      return`<div class="card" style="padding:13px 15px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${limit>0?'10':'0'}px">
          <div style="width:34px;height:34px;border-radius:10px;background:${c.color};display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${c.emoji}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600">${esc(c.name)}${over?'<span class="over-badge">over!</span>':''}</div>
            <div style="font-size:11px;color:var(--dim);margin-top:1px">${limit>0?`CHF ${fmt(spent)} of CHF ${fmt(limit)}`:`CHF ${fmt(spent)} spent · no limit`}</div>
          </div>

function deleteCat(id){
  if(state.expenses.some(e=>e.catId===id)){toast('Remove related expenses first');return;}

}

// ── BILLS ──
function buildBills(){
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const key=`${y}-${m}`;
  const bills=state.bills;
  const activeBills=bills.filter(b=>b.active);
  const billsThisMonth=activeBills.filter(b=>{
    if(b.recurrence==='once'&&b.onceDate){
      const d=new Date(b.onceDate);return d.getMonth()===m&&d.getFullYear()===y;
    }
    return b.recurrence!=='once';
  });
  const monthlyTotal=billsThisMonth.reduce((s,b)=>s+b.amount,0);
  const paid=bills.filter(b=>(b.paidMonths||[]).includes(key));
  const unpaid=billsThisMonth.filter(b=>!(b.paidMonths||[]).includes(key));
  const billItem=(b,isPaid)=>{
    const cat=state.categories.find(c=>c.id===b.catId)||{emoji:'📋',color:'#f0dff0'};
    let recLabel={monthly:'Monthly',weekly:'Weekly',yearly:'Yearly',once:'One-time'}[b.recurrence]||'Monthly';
    let dueSub='';
    if(b.recurrence==='once'&&b.onceDate){
      const d=new Date(b.onceDate);
      dueSub=' · '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    }else if(b.dueDay){
      dueSub=' · Day '+b.dueDay;
    }
    return`<div class="list-item">
      <div class="item-icon" style="background:${isPaid?'var(--mint-l)':cat.color}">${isPaid?'✓':cat.emoji}</div>
      <div class="item-info">
        <div class="item-name">${esc(b.name)}</div>
        <div class="item-sub">${recLabel}${dueSub}</div>
      </div>
      <div class="item-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="item-amount" style="color:${isPaid?'var(--dim)':'var(--text)'};${isPaid?'text-decoration:line-through':''}">CHF ${fmt(b.amount)}</div>
        ${!isPaid
          ?`<button class="btn btn-sm btn-mint" onclick="openPayBill('${b.id}')">Pay</button>`
          :`<button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="unpayBill('${b.id}','${key}')">Undo</button>`}
      </div>
      <button class="del-btn" onclick="deleteBill('${b.id}')">×</button>
    </div>`;
  };
  return`<div class="fade-up">
    <div class="tile-row">
      <div class="tile"><div class="tile-label">This month</div><div class="tile-val" style="color:var(--muted)">CHF ${fmt(monthlyTotal)}</div></div>
      <div class="tile"><div class="tile-label">Paid</div><div class="tile-val" style="color:var(--mint)">${paid.length}</div></div>
      <div class="tile"><div class="tile-label">Due</div><div class="tile-val" style="color:var(--pink)">${unpaid.length}</div></div>
    </div>
    ${unpaid.length>0?`<div class="sec-label">To pay</div><div class="card card-flush">${unpaid.map(b=>billItem(b,false)).join('')}</div>`:''}
    ${paid.length>0?`<div class="sec-label" style="margin-top:10px">Paid</div><div class="card card-flush">${paid.map(b=>billItem(b,true)).join('')}</div>`:''}
    ${bills.length===0?`<div class="empty">No bills yet ✨</div>`:''}
    <button class="btn btn-pink btn-full" onclick="openAddBill()" style="margin-top:8px">+ Add bill</button>
  </div>`;
}
function deleteBill(id){state.bills=state.bills.filter(b=>b.id!==id);save();render();toast('Bill removed');}
function unpayBill(id,key){
  const b=state.bills.find(x=>x.id===id);if(!b)return;
  b.paidMonths=(b.paidMonths||[]).filter(k=>k!==key);
  state.expenses=state.expenses.filter(e=>!(e.billId===id&&e.billKey===key));
  save();render();toast("Marked unpaid");
}

// ── MONEY ──

    :wallet.map(w=>{

        </div>

    }).join('');
  const savings=state.savings;
  const savHTML=savings.length===0
    ?`<div class="empty" style="padding:12px">No goals yet 🌱</div>`
    :savings.map(g=>{
      const pct=g.goal>0?Math.min(100,Math.round(g.saved/g.goal*100)):0;
      return`<div class="card" style="padding:13px 15px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div><div style="font-size:14px;font-weight:600">${esc(g.name)}</div><div style="font-size:11px;color:var(--dim);margin-top:1px">CHF ${fmt(g.saved)} of CHF ${fmt(g.goal)}</div></div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:13px;font-weight:700;color:var(--mint)">${pct}%</span>
            <button class="btn btn-sm" onclick="openAddToSavings('${g.id}')" style="background:var(--mint-l);color:var(--mint-d);border:none">+ Add</button>
            <button class="del-btn" onclick="deleteSavings('${g.id}')">×</button>
          </div>
        </div>
        <div class="bar-track" style="height:5px"><div class="bar-fill" style="width:${pct}%;background:var(--mint)"></div></div>
        <div style="font-size:11px;color:var(--dim);margin-top:5px">${Math.max(0,g.goal-g.saved)>0?`CHF ${fmt(Math.max(0,g.goal-g.saved))} to go`:'🎉 Goal reached!'}</div>
      </div>`;
    }).join('');
  const manualDebts=state.debts;
  const cardDebts=wallet.filter(w=>w.type==='card'&&w.balance<0).map(w=>({id:'_c_'+w.id,name:w.name,total:Math.abs(w.balance),paid:0,isCard:true}));
  const allDebts=[...manualDebts,...cardDebts];
  const debtHTML=allDebts.length===0
    ?`<div class="empty" style="padding:12px">No debts — nice! 🎉</div>`
    :allDebts.map(d=>{
      const pct=d.total>0?Math.min(100,Math.round(d.paid/d.total*100)):0;
      const rem=Math.max(0,d.total-d.paid);
      return`<div class="card" style="padding:13px 15px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-size:14px;font-weight:600">${esc(d.name)}${d.isCard?`<span style="font-size:10px;color:var(--lav);background:var(--lav-l);border-radius:99px;padding:2px 7px;margin-left:5px;font-weight:700">card</span>`:''}</div>
            <div style="font-size:11px;color:var(--dim);margin-top:1px">CHF ${fmt(rem)} remaining</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:13px;font-weight:700;color:var(--red)">CHF ${fmt(d.total)}</span>
            ${!d.isCard?`<button class="btn btn-sm btn-danger" onclick="openPayDebt('${d.id}')">Pay</button><button class="del-btn" onclick="deleteDebt('${d.id}')">×</button>`:`<span style="font-size:11px;color:var(--dim)">edit in wallet</span>`}
          </div>
        </div>
        <div class="bar-track" style="height:5px"><div class="bar-fill" style="width:${pct}%;background:var(--red)"></div></div>
        <div style="font-size:11px;color:var(--dim);margin-top:5px">${pct}% paid off</div>
      </div>`;
    }).join('');
  return`<div class="fade-up">
    <div class="sec-label">My accounts</div>
    <div class="wallet-row">${walletHTML}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">

      ${wallet.length>1?`<button class="btn btn-ghost btn-sm" onclick="openTransfer()">⇄ Transfer</button>`:''}
      ${wallet.length>0?`<div style="flex:1;min-width:100px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:8px 13px;font-size:12px;color:var(--muted);font-weight:500">Net: <b style="color:${net>=0?'var(--mint)':'var(--red)'}">CHF ${fmt(net)}</b></div>`:''}
    </div>
    <div class="sec-label">Savings goals</div>
    ${savHTML}
    <button class="btn btn-mint btn-full btn-sm" onclick="openAddSavingsGoal()" style="margin-bottom:16px">+ New goal</button>
    <div class="sec-label">Debts</div>
    ${debtHTML}

  </div>`;
}
function deleteSavings(id){state.savings=state.savings.filter(g=>g.id!==id);save();render();toast('Goal removed');}
function deleteDebt(id){state.debts=state.debts.filter(d=>d.id!==id);save();render();toast('Debt removed');}

// ── TRANSFER ──
function openTransfer(){
  if(state.wallet.length<2){toast('Need at least 2 accounts to transfer');return;}
  const opts=state.wallet.map(w=>`<option value="${w.id}">${{bank:'🏦',cash:'💵',card:'💳'}[w.type]||'💰'} ${esc(w.name)} · CHF ${fmt(w.balance)}</option>`).join('');
  openSheet(`
    <div class="sheet-title">Transfer between accounts</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Move money from one account to another — e.g. pay off your credit card from your bank account.</div>
    <div class="col">
      <div><label>From</label><select id="tr-from">${opts}</select></div>
      <div><label>To</label><select id="tr-to">${opts}</select></div>
      <div><label>Amount (CHF)</label><input id="tr-amt" type="number" placeholder="0.00" step="0.01" min="0"/></div>
      <button class="btn btn-pink btn-full" onclick="doTransfer()" style="margin-top:6px">Transfer</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function doTransfer(){
  const fromId=document.getElementById('tr-from')?.value;
  const toId=document.getElementById('tr-to')?.value;
  const amt=parseFloat(document.getElementById('tr-amt')?.value)||0;
  if(fromId===toId){toast('Pick two different accounts');return;}
  if(amt<=0){toast('Enter an amount');return;}
  const from=state.wallet.find(w=>w.id===fromId);
  const to=state.wallet.find(w=>w.id===toId);
  if(!from||!to)return;
  from.balance=Math.round((from.balance-amt)*100)/100;
  to.balance=Math.round((to.balance+amt)*100)/100;
  save();closeSheet();render();toast(`CHF ${fmt(amt)} transferred ✓`);
}

// ── SETTINGS ──
function buildSettings(){
  const days=backupDaysAgo();
  const sub=days===null?'Never backed up yet':days===0?'Backed up today':'Last backup: '+days+' days ago';
  return`<div class="fade-up">
    <div class="card card-flush" style="margin-bottom:14px">
      <div class="settings-row" onclick="exportData()">
        <div><div class="settings-label">💾 Backup data</div><div class="settings-sub">${sub}</div></div><span style="color:var(--dim)">›</span>
      </div>
      <div class="settings-row" onclick="importData()">
        <div><div class="settings-label">📥 Restore backup</div><div class="settings-sub">Load a .json backup file</div></div><span style="color:var(--dim)">›</span>
      </div>
      <div class="settings-row" onclick="confirmReset()">
        <div><div class="settings-label" style="color:var(--red)">🗑️ Reset all data</div><div class="settings-sub">Wipe everything and start fresh</div></div><span style="color:var(--dim)">›</span>
      </div>
    </div>
    <div class="card" style="background:var(--pink-l);border-color:var(--pink-m)">
      <div style="font-size:13px;font-weight:600;color:var(--pink-d);margin-bottom:4px">About Nessie's Budget</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7">All data lives only on your phone — nothing is sent anywhere. Back up regularly to stay safe 🌸</div>
    </div>
  </div>`;
}
function backupDaysAgo(){
  if(!state.lastBackup)return null;
  return Math.floor((new Date()-new Date(state.lastBackup))/(1000*60*60*24));
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='nessie-budget-'+todayStr()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  state.lastBackup=todayStr();save();render();toast('Backup saved 💾');
}
function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imp=JSON.parse(ev.target.result);
        if(!imp.expenses){toast('⚠️ Invalid file');return;}
        openConfirm('Restore backup?','This replaces ALL current data.','Yes, restore',()=>{
          Object.assign(state,imp);
          ['expenses','categories','bills','savings','debts','wallet'].forEach(k=>{if(!Array.isArray(state[k]))state[k]=[];});if(!Array.isArray(state.incomeEntries))state.incomeEntries=[];;
          save();toast('Data restored ✓');setView('expenses');
        });
      }catch{toast('⚠️ Could not read file');}
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}
function confirmReset(){
  openConfirm('Reset everything?','This permanently deletes all data. Make a backup first!','Yes, reset',()=>{
    state=defaultState();save();toast('Data reset');setView('expenses');
  });
}

function selCat(el,id){

function saveExpense(){
  const name=document.getElementById('qa-name')?.value.trim();
  const amount=parseFloat(document.getElementById('qa-amount')?.value);
  const date=document.getElementById('qa-date')?.value;
  const catId=document.getElementById('qa-cat')?.value;
  const walletId=document.getElementById('qa-wallet')?.value||'';
  if(!name){toast('Enter a description');return;}
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  if(!date){toast('Pick a date');return;}
  const exp={id:uid(),date,name,amount,catId};
  if(walletId){
    const w=state.wallet.find(x=>x.id===walletId);
    if(w){
      const newBal=Math.round((w.balance-amount)*100)/100;
      if(newBal<0&&w.balance>=0){
        window._pendingExp=exp;
        window._pendingWalletId=walletId;
        openOverdraftWarning(w.name,newBal,()=>{
          w.balance=newBal;
          state.expenses.push(window._pendingExp);
          window._pendingExp=null;window._pendingWalletId=null;
          save();closeSheet();render();toast('Expense saved ✓');
        });
        return;
      }
      w.balance=newBal;
    }
  }
  state.expenses.push(exp);
  save();closeSheet();render();toast('Expense saved ✓');
}

function selCat(el,id){
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');document.getElementById('qa-cat').value=id;
}

const CAT_PALETTES=[
  {bg:"#faeaec",accent:"#8c4a54"},{bg:"#fdf0e8",accent:"#8a5030"},{bg:"#fce8e4",accent:"#904838"},
  {bg:"#dceaf4",accent:"#2c5878"},{bg:"#dceee9",accent:"#2a5a50"},{bg:"#ece8f8",accent:"#4a3480"},
  {bg:"#f8ede4",accent:"#785040"},{bg:"#eef6e8",accent:"#406030"},{bg:"#f8eef0",accent:"#7a4858"},
];
function openAddCat(){openCatSheet(null);}
function openEditCat(id){openCatSheet(state.categories.find(c=>c.id===id));}
function openCatSheet(cat){
  const isEdit=!!cat;
  const curEmoji=cat?.emoji||'❓';
  let curPalIdx=isEdit?CAT_PALETTES.findIndex(p=>p.bg===cat.color):0;
  if(curPalIdx<0)curPalIdx=0;
  const emojiPicker=CAT_EMOJIS.map(e=>
    `<button onclick="pickEmoji(this,'${e}')" style="font-size:22px;background:${e===curEmoji?'var(--pink-l)':'transparent'};border:${e===curEmoji?'1.5px solid var(--pink)':'1.5px solid transparent'};border-radius:10px;padding:6px;cursor:pointer;transition:all .13s">${e}</button>`
  ).join('');
  const colorPicker=CAT_PALETTES.map((p,i)=>
    `<button onclick="pickColor(this,${i})" style="width:28px;height:28px;border-radius:99px;background:${p.bg};border:${i===curPalIdx?'2.5px solid var(--pink)':'2px solid transparent'};cursor:pointer;outline:none;box-shadow:inset 0 0 0 4px ${p.accent}50"></button>`
  ).join('');
  openSheet(`
    <div class="sheet-title">${isEdit?'Edit':'New'} category</div>
    <div class="col">
      <div><label>Name</label><input id="cat-name" type="text" placeholder="e.g. Groceries" value="${isEdit?esc(cat.name):''}"/></div>
      <div><label>Monthly limit (CHF) — optional</label><input id="cat-limit" type="number" placeholder="Leave blank for no limit" min="0" value="${isEdit&&cat.limit?cat.limit:''}"/></div>
      <div><label>Icon</label><div style="display:flex;flex-wrap:wrap;gap:4px" id="emoji-picker">${emojiPicker}</div><input type="hidden" id="cat-emoji" value="${curEmoji}"/></div>
      <div><label>Colour</label><div style="display:flex;gap:8px;flex-wrap:wrap" id="color-picker">${colorPicker}</div><input type="hidden" id="cat-pal" value="${curPalIdx}"/></div>
      <button class="btn btn-pink btn-full" onclick="saveCat('${isEdit?cat.id:''}')" style="margin-top:6px">${isEdit?'Save changes':'Add category'}</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function pickEmoji(el,e){
  document.querySelectorAll('#emoji-picker button').forEach(b=>{b.style.background='transparent';b.style.border='1.5px solid transparent';});
  el.style.background='var(--pink-l)';el.style.border='1.5px solid var(--pink)';
  document.getElementById('cat-emoji').value=e;
}
function pickColor(el,idx){
  document.querySelectorAll('#color-picker button').forEach(b=>b.style.border='2px solid transparent');
  el.style.border='2.5px solid var(--pink)';
  document.getElementById('cat-pal').value=idx;
}
function saveCat(id){
  const name=document.getElementById('cat-name')?.value.trim();
  const limit=parseFloat(document.getElementById('cat-limit')?.value)||0;
  const emoji=document.getElementById('cat-emoji')?.value||'❓';
  const pi=parseInt(document.getElementById('cat-pal')?.value)||0;
  const pal=CAT_PALETTES[pi]||CAT_PALETTES[0];
  if(!name){toast('Enter a name');return;}
  if(id){
    const c=state.categories.find(x=>x.id===id);
    if(c){c.name=name;c.limit=limit;c.emoji=emoji;c.color=pal.bg;c.accent=pal.accent;}
  }else{
    state.categories.push({id:uid(),name,limit,emoji,color:pal.bg,accent:pal.accent});
  }
  save();closeSheet();render();toast(id?'Category updated':'Category added ✓');
}

// ── SHEETS: BILLS ──
function openAddBill(){
  const catOpts=state.categories.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  const today=todayStr();
  openSheet(`
    <div class="sheet-title">Add bill</div>
    <div class="col">
      <div><label>Name</label><input id="bl-name" type="text" placeholder="e.g. Rent, Netflix, gym…"/></div>
      <div><label>Estimated amount (CHF)</label><input id="bl-amount" type="number" placeholder="0.00" step="0.01" min="0"/></div>
      <div><label>Recurrence</label>
        <select id="bl-rec" onchange="toggleBillDateField()">
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
          <option value="yearly">Yearly</option>
          <option value="once">One-time</option>
        </select>
      </div>
      <div id="bl-day-wrap"><label>Due day of month (optional)</label><input id="bl-day" type="number" placeholder="e.g. 1 for the 1st" min="1" max="31"/></div>
      <div id="bl-date-wrap" style="display:none"><label>Exact date</label><input id="bl-date" type="date" value="${today}"/></div>
      ${catOpts?`<div><label>Category (optional)</label><select id="bl-cat"><option value="">— none —</option>${catOpts}</select></div>`:''}
      <button class="btn btn-pink btn-full" onclick="saveBill()" style="margin-top:6px">Add bill</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function toggleBillDateField(){
  const isOnce=document.getElementById('bl-rec')?.value==='once';
  document.getElementById('bl-day-wrap').style.display=isOnce?'none':'block';
  document.getElementById('bl-date-wrap').style.display=isOnce?'block':'none';
}
function saveBill(){
  const name=document.getElementById('bl-name')?.value.trim();
  const amount=parseFloat(document.getElementById('bl-amount')?.value);
  const rec=document.getElementById('bl-rec')?.value||'monthly';
  const day=parseInt(document.getElementById('bl-day')?.value)||null;
  const onceDate=rec==='once'?(document.getElementById('bl-date')?.value||null):null;
  const catId=document.getElementById('bl-cat')?.value||null;
  if(!name){toast('Enter a name');return;}
  if(!amount||amount<=0){toast('Enter a valid amount');return;}
  if(rec==='once'&&!onceDate){toast('Pick a date for this bill');return;}
  state.bills.push({id:uid(),name,amount,recurrence:rec,dueDay:day,onceDate,catId,active:true,paidMonths:[]});
  save();closeSheet();render();toast('Bill added ✓');
}
function openPayBill(id){
  const b=state.bills.find(x=>x.id===id);if(!b)return;
  const now=new Date(),m=viewMonth??now.getMonth(),y=viewYear??now.getFullYear();
  const key=`${y}-${m}`;
  const walletOpts=state.wallet.length>0
    ?`<div><label>Deduct from account (optional)</label><select id="bp-wallet">
        <option value="">— don't deduct —</option>
        ${state.wallet.map(w=>`<option value="${w.id}">${{bank:'🏦',cash:'💵',card:'💳'}[w.type]||'💰'} ${esc(w.name)} · CHF ${fmt(w.balance)}</option>`).join('')}
      </select></div>`:'';
  openSheet(`
    <div class="sheet-title">Pay "${esc(b.name)}"</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Estimated: <b>CHF ${fmt(b.amount)}</b> — adjust if the actual differs.</div>
    <div class="col">
      <div><label>Actual amount paid (CHF)</label><input id="bp-amount" type="number" value="${b.amount}" step="0.01" min="0"/></div>
      ${walletOpts}
      <button class="btn btn-mint btn-full" onclick="confirmPayBill('${id}','${key}')" style="margin-top:6px">Mark as paid ✓</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function confirmPayBill(id,key){
  const b=state.bills.find(x=>x.id===id);if(!b)return;
  const amount=parseFloat(document.getElementById('bp-amount')?.value)||b.amount;
  const walletId=document.getElementById('bp-wallet')?.value||'';
  const doFinish=()=>{
    if(!b.paidMonths)b.paidMonths=[];
    b.paidMonths.push(key);
    if(b.catId){
      const [yr,mo]=key.split('-').map(Number);
      const now=new Date();
      const expDate=(mo===now.getMonth()&&yr===now.getFullYear())?todayStr():`${yr}-${String(mo+1).padStart(2,'0')}-01`;
      if(!state.expenses.some(e=>e.billId===id&&e.billKey===key))
        state.expenses.push({id:uid(),date:expDate,name:b.name,amount,catId:b.catId,billId:id,billKey:key});
    }
    save();closeSheet();render();toast('Bill paid ✓');
  };
  if(walletId){
    const w=state.wallet.find(x=>x.id===walletId);
    if(w){
      const newBal=Math.round((w.balance-amount)*100)/100;
      if(newBal<0&&w.balance>=0){openOverdraftWarning(w.name,newBal,()=>{w.balance=newBal;doFinish();});return;}
      w.balance=newBal;
    }
  }
  doFinish();
}

// ── SHEETS: WALLET ──
function openAddWallet(){openWalletSheet(null);}
function openEditWallet(id){openWalletSheet(state.wallet.find(w=>w.id===id));}
function openWalletSheet(w){
  const isEdit=!!w;
  openSheet(`
    <div class="sheet-title">${isEdit?'Edit':'Add'} account</div>
    <div class="col">
      <div><label>Account name</label><input id="wl-name" type="text" placeholder="e.g. UBS, Cash, Revolut…" value="${isEdit?esc(w.name):''}"/></div>
      <div><label>Type</label>
        <select id="wl-type">
          <option value="bank" ${isEdit&&w.type==='bank'?'selected':''}>🏦 Bank account</option>
          <option value="cash" ${isEdit&&w.type==='cash'?'selected':''}>💵 Cash</option>
          <option value="card" ${isEdit&&w.type==='card'?'selected':''}>💳 Credit / prepaid card</option>
        </select>
      </div>
      <div><label>Current balance (CHF) — use negative for debt e.g. -450</label><input id="wl-bal" type="number" step="0.01" placeholder="0.00" value="${isEdit?w.balance:''}"/></div>
      <button class="btn btn-pink btn-full" onclick="saveWalletAcc('${isEdit?w.id:''}')" style="margin-top:6px">${isEdit?'Save changes':'Add account'}</button>
      ${isEdit?`<button class="btn btn-danger btn-full" onclick="openConfirm('Remove account?','This cannot be undone.','Remove',()=>{deleteWallet('${w.id}')})">Remove account</button>`:''}
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function saveWalletAcc(id){
  const name=document.getElementById('wl-name')?.value.trim();
  const type=document.getElementById('wl-type')?.value||'bank';
  const balance=parseFloat(document.getElementById('wl-bal')?.value)||0;
  if(!name){toast('Enter a name');return;}
  if(id){const w=state.wallet.find(x=>x.id===id);if(w){w.name=name;w.type=type;w.balance=balance;}}
  else{state.wallet.push({id:uid(),name,type,balance});}
  save();closeSheet();render();toast(id?'Account updated':'Account added ✓');
}
function deleteWallet(id){state.wallet=state.wallet.filter(w=>w.id!==id);save();closeSheet();render();toast('Account removed');}

// ── SHEETS: SAVINGS ──
function openAddSavingsGoal(){
  openSheet(`
    <div class="sheet-title">New savings goal</div>
    <div class="col">
      <div><label>Goal name</label><input id="sg-name" type="text" placeholder="e.g. Holiday, new laptop…"/></div>
      <div><label>Target (CHF)</label><input id="sg-goal" type="number" placeholder="0" min="0"/></div>
      <div><label>Already saved (CHF)</label><input id="sg-saved" type="number" placeholder="0" min="0" value="0"/></div>
      <button class="btn btn-mint btn-full" onclick="saveSavingsGoal()" style="margin-top:6px">Create goal</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function saveSavingsGoal(){
  const name=document.getElementById('sg-name')?.value.trim();
  const goal=parseFloat(document.getElementById('sg-goal')?.value)||0;
  const saved=parseFloat(document.getElementById('sg-saved')?.value)||0;
  if(!name){toast('Enter a name');return;}
  if(goal<=0){toast('Enter a target amount');return;}
  state.savings.push({id:uid(),name,goal,saved});
  save();closeSheet();render();toast('Goal created 🌸');
}
function openAddToSavings(id){
  const g=state.savings.find(s=>s.id===id);if(!g)return;
  const walletOpts=state.wallet.length>0
    ?`<div><label>Deduct from account (optional)</label><select id="sa-wallet">
        <option value="">— don't deduct —</option>
        ${state.wallet.map(w=>`<option value="${w.id}">${{bank:'🏦',cash:'💵',card:'💳'}[w.type]||'💰'} ${esc(w.name)} · CHF ${fmt(w.balance)}</option>`).join('')}
      </select></div>`:'';
  openSheet(`
    <div class="sheet-title">Add to "${esc(g.name)}"</div>
    <div class="col">
      <div><label>Amount (CHF)</label><input id="sa-amt" type="number" placeholder="0" min="0"/></div>
      ${walletOpts}
      <button class="btn btn-mint btn-full" onclick="doAddSavings('${id}')" style="margin-top:6px">Add to savings</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function doAddSavings(id){
  const amount=parseFloat(document.getElementById('sa-amt')?.value)||0;
  if(amount<=0){toast('Enter an amount');return;}
  const g=state.savings.find(s=>s.id===id);if(!g)return;
  const walletId=document.getElementById('sa-wallet')?.value||'';
  const doFinish=()=>{g.saved=Math.min(g.goal,g.saved+amount);save();closeSheet();render();toast('+CHF '+fmt(amount)+' saved ✓');};
  if(walletId){
    const w=state.wallet.find(x=>x.id===walletId);
    if(w){
      const newBal=Math.round((w.balance-amount)*100)/100;
      if(newBal<0&&w.balance>=0){openOverdraftWarning(w.name,newBal,()=>{w.balance=newBal;doFinish();});return;}
      w.balance=newBal;
    }
  }
  doFinish();
}

// ── SHEETS: DEBT ──
function openAddDebt(){
  openSheet(`
    <div class="sheet-title">Add debt</div>
    <div class="col">
      <div><label>Name</label><input id="db-name" type="text" placeholder="e.g. Credit loan…"/></div>
      <div><label>Total amount (CHF)</label><input id="db-total" type="number" placeholder="0" min="0"/></div>
      <div><label>Already paid (CHF)</label><input id="db-paid" type="number" placeholder="0" min="0" value="0"/></div>
      <button class="btn btn-danger btn-full" onclick="saveDebt()" style="margin-top:6px">Add debt</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function saveDebt(){
  const name=document.getElementById('db-name')?.value.trim();
  const total=parseFloat(document.getElementById('db-total')?.value)||0;
  const paid=parseFloat(document.getElementById('db-paid')?.value)||0;
  if(!name){toast('Enter a name');return;}
  if(total<=0){toast('Enter total amount');return;}
  state.debts.push({id:uid(),name,total,paid:Math.min(paid,total)});
  save();closeSheet();render();toast('Debt added');
}
function openPayDebt(id){
  const d=state.debts.find(x=>x.id===id);if(!d)return;
  const walletOpts=state.wallet.length>0
    ?`<div><label>Pay from account</label><select id="dp-wallet">
        <option value="">— don't deduct from wallet —</option>
        ${state.wallet.map(w=>`<option value="${w.id}">${{bank:'🏦',cash:'💵',card:'💳'}[w.type]||'💰'} ${esc(w.name)} · CHF ${fmt(w.balance)}</option>`).join('')}
      </select></div>`:'';
  openSheet(`
    <div class="sheet-title">Pay "${esc(d.name)}"</div>
    <div class="col">
      <div><label>Amount paid (CHF)</label><input id="dp-amt" type="number" placeholder="0" min="0"/></div>
      ${walletOpts}
      <button class="btn btn-danger btn-full" onclick="doPayDebt('${id}')" style="margin-top:6px">Mark paid</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}
function doPayDebt(id){
  const amount=parseFloat(document.getElementById('dp-amt')?.value)||0;
  if(amount<=0){toast('Enter an amount');return;}
  const d=state.debts.find(x=>x.id===id);if(!d)return;
  const walletId=document.getElementById('dp-wallet')?.value||'';
  const doFinish=()=>{d.paid=Math.min(d.total,d.paid+amount);save();closeSheet();render();toast('CHF '+fmt(amount)+' paid off ✓');};
  if(walletId){
    const w=state.wallet.find(x=>x.id===walletId);
    if(w){
      const newBal=Math.round((w.balance-amount)*100)/100;
      if(newBal<0&&w.balance>=0){openOverdraftWarning(w.name,newBal,()=>{w.balance=newBal;doFinish();});return;}
      w.balance=newBal;
    }
  }
  doFinish();
}

// ── OVERDRAFT WARNING ──
function openOverdraftWarning(accountName,newBal,onConfirm){
  openSheet(`
    <div style="text-align:center;padding:8px 0 4px">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <div class="sheet-title" style="text-align:center;margin-bottom:8px">Account will go negative</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px">
        <b>${esc(accountName)}</b> doesn't have enough funds.<br>
        New balance would be <b style="color:var(--red)">CHF ${fmt(newBal)}</b>.
      </div>
      <div class="col">
        <button class="btn btn-danger btn-full" onclick="(${onConfirm.toString()})();closeSheet()">Proceed anyway</button>
        <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
      </div>
    </div>
  `);
}

// ── OVERLAY HELPERS ──
let _sheetEl=null;
function openSheet(html){
  closeSheet();
  _sheetEl=document.createElement('div');
  _sheetEl.className='overlay';
  _sheetEl.onclick=e=>{if(e.target===_sheetEl)closeSheet();};
  _sheetEl.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>${html}</div>`;
  document.body.appendChild(_sheetEl);
}
function closeSheet(){if(_sheetEl){_sheetEl.remove();_sheetEl=null;}}
function openConfirm(title,msg,label,cb){
  openSheet(`
    <div class="sheet-title">${title}</div>
    <div style="font-size:13.5px;color:var(--muted);margin-bottom:18px;line-height:1.6">${msg}</div>
    <div class="col">
      <button class="btn btn-danger btn-full" onclick="(${cb.toString()})();closeSheet()">${label}</button>
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">Cancel</button>
    </div>
  `);
}

// ── UTILS ──
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmt(n){return Number(n).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function prevMo(m,y){return m===0?{m:11,y:y-1}:{m:m-1,y};}
function nextMo(m,y){return m===11?{m:0,y:y+1}:{m:m+1,y};}
let _toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// ── INIT ──
function init(){
  load();
  const now=new Date();
  viewMonth=now.getMonth();viewYear=now.getFullYear();
  document.getElementById('header-sub').textContent=
    now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  setView('expenses');
}
init();
</script>
