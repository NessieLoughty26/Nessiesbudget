<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#FFF0F8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Nessie's Budget"/>
<title>Nessie's Budget 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#FFF5FB; --bg2:#FFF0F8; --card:#FFFFFF; --card2:#FDF0FA; --border:#F0D6EE;
  --shadow:rgba(220,130,200,.12);
  --pink:#FF6EB4; --pink-l:#FFE0F3; --pink-d:#C4006E;
  --peach:#FF9E7A; --peach-l:#FFE8DF;
  --mint:#3DD9A4; --mint-l:#D4F7EC; --mint-d:#1A7A5A;
  --lav:#A78BFA; --lav-l:#EDE9FE;
  --sky:#38BDF8; --sky-l:#E0F4FF;
  --yellow:#FBBF24; --yellow-l:#FEF3C7;
  --red:#F87171; --red-l:#FEE2E2;
  --text:#3D2352; --muted:#9B72C0; --dim:#C4A8D8; --white:#FFFFFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-4deg)}75%{transform:rotate(4deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.fade-up{animation:fadeUp .3s ease both}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:18px;box-shadow:0 2px 12px var(--shadow);position:relative;overflow:hidden}
.card2{background:var(--card2)}
input,select,textarea{background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:11px 14px;color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--pink);box-shadow:0 0 0 3px #FF6EB422}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:14px;border:none;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn-pink{background:var(--pink);color:white;box-shadow:0 4px 14px #FF6EB440}
.btn-mint{background:var(--mint);color:white;box-shadow:0 4px 14px #3DD9A440}
.btn-lav{background:var(--lav);color:white;box-shadow:0 4px 14px #A78BFA40}
.btn-peach{background:var(--peach);color:white;box-shadow:0 4px 14px #FF9E7A40}
.btn-ghost{background:white;border:1.5px solid var(--border);color:var(--muted);box-shadow:0 2px 8px var(--shadow)}
.btn-danger{background:var(--red-l);border:1.5px solid #F8717144;color:var(--red)}
.bar-track{background:var(--border);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.2,.64,1)}
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:800}
.pill{padding:7px 16px;border-radius:99px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.pill-active{background:var(--pink);color:white;box-shadow:0 3px 10px #FF6EB440}
.pill-inactive{background:white;color:var(--muted);border:1.5px solid var(--border)}
.overlay{position:fixed;inset:0;background:rgba(180,100,200,.25);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.sheet{background:white;border-radius:28px 28px 0 0;border-top:1.5px solid var(--border);padding:8px 20px 50px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(.34,1.2,.64,1) both;box-shadow:0 -8px 40px rgba(200,100,200,.15)}
.sheet-handle{width:44px;height:5px;background:var(--border);border-radius:99px;margin:10px auto 22px}
#header{position:sticky;top:0;background:rgba(255,245,251,.92);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);padding:14px 18px 12px;padding-top:calc(14px + env(safe-area-inset-top));z-index:50;display:flex;justify-content:space-between;align-items:center}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1.5px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:50;box-shadow:0 -4px 20px rgba(200,100,200,.1)}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;padding:4px 10px;border-radius:12px;transition:all .2s;color:var(--dim)}
.nav-btn.active{color:var(--pink)}
.nav-btn.active .nav-icon{animation:wiggle .4s ease}
.nav-icon{font-size:22px;line-height:1}
#content{padding:14px 14px 110px;position:relative;z-index:1}
.row{display:flex;gap:10px;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.divider{border:none;border-top:1.5px solid var(--border);margin:12px 0}
.empty{text-align:center;color:var(--dim);padding:36px 20px;font-size:14px}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:white;border:1.5px solid var(--pink);color:var(--pink-d);padding:10px 22px;border-radius:99px;font-size:13px;font-weight:800;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px #FF6EB433}
#toast.show{opacity:1}
.blob{position:absolute;border-radius:999px;pointer-events:none;opacity:.35;filter:blur(32px)}
.big-num{font-family:Fredoka,sans-serif;font-size:48px;font-weight:700;line-height:1}
.section-title{font-family:Fredoka,sans-serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div style="font-family:Fredoka,sans-serif;font-size:22px;font-weight:700;color:var(--pink)">🌸 Nessie's Budget</div>
      <div id="header-date" style="font-size:11px;color:var(--dim);font-weight:700;margin-top:1px"></div>
    </div>
    <button class="btn btn-pink" onclick="openQuickAdd()" style="padding:9px 16px;font-size:13px;border-radius:12px">✨ Add</button>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="setView('dashboard')" id="nav-dashboard"><span class="nav-icon">🏠</span><span>Home</span></button>
    <button class="nav-btn" onclick="setView('budget')" id="nav-budget"><span class="nav-icon">🎯</span><span>Budget</span></button>
    <button class="nav-btn" onclick="setView('overview')" id="nav-overview"><span class="nav-icon">📅</span><span>Overview</span></button>
    <button class="nav-btn" onclick="setView('savings')" id="nav-savings"><span class="nav-icon">💰</span><span>Savings</span></button>
    <button class="nav-btn" onclick="setView('debt')" id="nav-debt"><span class="nav-icon">💳</span><span>Debt</span></button>
    <button class="nav-btn" onclick="setView('settings')" id="nav-settings"><span class="nav-icon">⚙️</span><span>Settings</span></button>
  </nav>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  CONSTANTS & DEFAULTS
// ═══════════════════════════════════════════
const STORE_KEY = 'budgetbrain_v4';

const DEFAULT_BUDGET = {
  '🏠 Housing':1715,'🛒 Food & Groceries':350,'🚌 Transport':350,
  '💊 Health':363,'🎉 Fun & Social':250,'💼 Work & Personal':360,
  '💳 Debt Payments':735,'💰 Savings':250,'❓ Other':0,
};

const DEFAULT_BILLS = [
  {id:1,name:'Rent',         amount:1315,day:1, category:'🏠 Housing',        active:true,note:''},
  {id:2,name:'Credit Loan',  amount:735, day:1, category:'💳 Debt Payments',  active:true,note:'Auto-pay'},
  {id:3,name:'Therapy',      amount:240, day:5, category:'💊 Health',         active:true,note:''},
  {id:4,name:'Phone',        amount:200, day:10,category:'💼 Work & Personal',active:true,note:''},
  {id:5,name:'Gym',          amount:123, day:15,category:'💊 Health',         active:true,note:''},
  {id:6,name:'Subscriptions',amount:60,  day:20,category:'💼 Work & Personal',active:true,note:''},
];

const PAY         = ['💳 Card','💵 Cash','🏦 Transfer'];
const INC_KEYS    = ['salary','commission','author','other'];
const INC_LABELS  = ['💼 Salary','📈 Commission','✍️ Author Income','💡 Other'];
const INC_DEF     = [4200,0,0,0];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const DEFAULT_CAT_COLORS = {
  '🏠 Housing':['#FFE0F3','#FF6EB4'],'🛒 Food & Groceries':['#FEF3C7','#F59E0B'],
  '🚌 Transport':['#E0F4FF','#38BDF8'],'💊 Health':['#D4F7EC','#3DD9A4'],
  '🎉 Fun & Social':['#EDE9FE','#A78BFA'],'💼 Work & Personal':['#FFE8DF','#FF9E7A'],
  '💳 Debt Payments':['#FEE2E2','#F87171'],'💰 Savings':['#D4F7EC','#3DD9A4'],
  '❓ Other':['#F3F0FF','#9B72C0'],
};
const COLOR_POOL = [
  ['#FFE0F3','#FF6EB4'],['#FEF3C7','#F59E0B'],['#E0F4FF','#38BDF8'],
  ['#D4F7EC','#3DD9A4'],['#EDE9FE','#A78BFA'],['#FFE8DF','#FF9E7A'],
  ['#FEE2E2','#F87171'],['#F0FFF4','#22C55E'],['#FFF7ED','#EA580C'],
  ['#F0F9FF','#0EA5E9'],['#FDF4FF','#D946EF'],['#FFFBEB','#D97706'],
  ['#F0FDFA','#0D9488'],['#FFF1F2','#E11D48'],['#F5F3FF','#7C3AED'],
];
const EMOJI_LIST = [
  '🏠','🏡','🛒','🍔','🍕','🍣','☕','🍰','🥗','🍜',
  '🚌','🚗','✈️','🚲','🚀','💊','🏥','🏋️','🧘','🛁',
  '🎉','🎮','🎬','🎵','🎨','📚','📱','💻','💡','🔑',
  '💳','🏦','💰','💸','🎯','💎','🛍️','👗','🧴','🐱',
  '🐶','⭐','🔥','✨','🎀','🌈','🌙','☀️','🌿','🍀',
  '🎁','🎓','🏆','🌍','❓','🆕','⚡','🎠','🧸','🌸',
];

let CAT_COLORS = {...DEFAULT_CAT_COLORS};

// ═══════════════════════════════════════════
//  STORE
// ═══════════════════════════════════════════
function loadStore() {
  try {
    const s = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    const loaded = {
      expenses:   s.expenses   || [],
      budget:     s.budget     || {...DEFAULT_BUDGET},
      income:     s.income     || {},
      debt:       s.debt       || {loanName:'Credit Loan',loanMonthly:735,loanMonths:96,loanTotal:0,loanStartDate:'',loanRate:0,loanNote:'',ccBalance:5000,ccExtra:0},
      wallet:     s.wallet     || {bank:0, cash:0, cc:0},
      ious:       s.ious       || [],
      savings:    s.savings    || [],
      bills:      s.bills      || DEFAULT_BILLS,
      settings:   s.settings   || {reminderTime:'21:30',notificationsOn:false,smartBudget:true},
      lastPrompt:  s.lastPrompt  || null,
      categories:  s.categories  || null,
      catColors:   s.catColors   || null,
      lastBackup:  s.lastBackup  || null,
    };
    if (!loaded.settings.hasOwnProperty('smartBudget')) loaded.settings.smartBudget = true;
    if (loaded.catColors) CAT_COLORS = {...DEFAULT_CAT_COLORS, ...loaded.catColors};
    return loaded;
  } catch(e) {
    return {expenses:[],budget:{...DEFAULT_BUDGET},income:{},
      debt:{loanName:'Credit Loan',loanMonthly:735,loanMonths:96,loanTotal:0,loanStartDate:'',loanRate:0,loanNote:'',ccBalance:5000,ccExtra:0},wallet:{bank:0,cash:0,cc:0},ious:[],
      bills:DEFAULT_BILLS,savings:[],settings:{reminderTime:'21:30',notificationsOn:false,smartBudget:true},
      lastPrompt:null,categories:null,catColors:null,lastBackup:null};
  }
}
function saveStore() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {} }
let state = loadStore();

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const fmt    = n => 'CHF ' + Number(n||0).toFixed(2);
const fmtR   = n => 'CHF ' + Math.round(n||0);
const todayStr  = () => new Date().toISOString().slice(0,10);
const monthKey  = (d=new Date()) => d.toISOString().slice(0,7);
const monthLabel= mk => { const [y,m]=mk.split('-'); return MONTH_NAMES[+m-1]+' '+y; };
const dom       = () => new Date().getDate();
const catBg     = c => (CAT_COLORS[c]||['#F3F0FF','#9B72C0'])[0];
const catFg     = c => (CAT_COLORS[c]||['#F3F0FF','#9B72C0'])[1];

function getIncome(mk) {
  const inc = state.income[mk] || {};
  return INC_KEYS.reduce((s,k) => s + (inc[k] !== undefined ? +inc[k] : 0), 0);
}
function monthExps(mk)  { return state.expenses.filter(e => (e.date||'').slice(0,7) === mk); }
function totalSpent(mk) { return monthExps(mk).reduce((s,e) => s + (+e.amount||0), 0); }
function byCat(exps)    { return exps.reduce((a,e) => { a[e.category]=(a[e.category]||0)+e.amount; return a; }, {}); }
function allMonths()    {
  const s = new Set([monthKey(), ...state.expenses.map(e => (e.date||'').slice(0,7))]);
  return [...s].filter(Boolean).sort().reverse();
}
function weekExps() {
  const ws = new Date(); ws.setHours(0,0,0,0); ws.setDate(ws.getDate() - ((ws.getDay()+6)%7));
  return state.expenses.filter(e => new Date(e.date+'T12:00:00') >= ws);
}
function getCategories() { return state.categories || Object.keys(state.budget); }

// ═══════════════════════════════════════════
//  CATEGORY MANAGEMENT
// ═══════════════════════════════════════════
function nextColor() {
  const used = Object.keys(CAT_COLORS).length;
  return COLOR_POOL[used % COLOR_POOL.length];
}
function addCategory(name) {
  if (!name.trim()) return;
  if (state.budget[name] !== undefined) { showToast('Category already exists! 🌸'); return; }
  const color = nextColor();
  state.budget[name] = 0;
  state.categories = [...getCategories(), name];
  state.catColors  = {...(state.catColors||{}), [name]: color};
  CAT_COLORS[name] = color;
  saveStore(); renderView(); showToast('✅ Category added! 🎀');
}
function renameCategory(oldName, newName) {
  if (!newName.trim() || newName === oldName) return;
  if (state.budget[newName] !== undefined) { showToast('Name already exists! 🌸'); return; }
  state.budget[newName] = state.budget[oldName]; delete state.budget[oldName];
  state.expenses = state.expenses.map(e => e.category===oldName ? {...e, category:newName} : e);
  const oldColor = state.catColors?.[oldName] || CAT_COLORS[oldName];
  state.catColors = {...(state.catColors||{})};
  if (oldColor) { state.catColors[newName] = oldColor; }
  delete state.catColors[oldName];
  CAT_COLORS[newName] = oldColor || nextColor(); delete CAT_COLORS[oldName];
  state.categories = getCategories().map(c => c===oldName ? newName : c);
  state.bills = state.bills.map(b => b.category===oldName ? {...b, category:newName} : b);
  saveStore(); renderView(); showToast('✅ Renamed! 🎀');
}
function deleteCategory(name) {
  if (Object.keys(state.budget).length <= 1) { showToast('Need at least one category!'); return; }
  const fallback = Object.keys(state.budget).find(k => k !== name) || '❓ Other';
  state.expenses = state.expenses.map(e => e.category===name ? {...e, category:fallback} : e);
  delete state.budget[name];
  state.categories = getCategories().filter(c => c !== name);
  if (state.catColors) delete state.catColors[name];
  delete CAT_COLORS[name];
  state.bills = state.bills.map(b => b.category===name ? {...b, category:fallback} : b);
  saveStore(); renderView(); showToast('🗑️ Category removed!');
}

// ═══════════════════════════════════════════
//  BILL MANAGEMENT
// ═══════════════════════════════════════════
function addBill() {
  state.bills = [...state.bills, {id:Date.now(),name:'New Bill',amount:0,day:1,category:getCategories()[0],active:true,note:''}];
  saveStore(); renderView();
}
function updateBill(idx, key, val) {
  state.bills = state.bills.map((b,i) => i===idx ? {...b, [key]: (key==='amount'||key==='day') ? parseFloat(val)||0 : val} : b);
  saveStore();
}
function billIsDueThisMonth(b) {
  const freq = b.freq || 'monthly';
  if (freq === 'monthly') return true;
  const m = new Date().getMonth() + 1;
  if (freq === 'quarterly') return [1,4,7,10].includes(m);
  if (freq === 'yearly')    return m === (b.yearMonth || 1);
  return true;
}
function deleteBill(idx) {
  openConfirm('🗑️ Remove bill?','Remove this bill from your reminders?','Remove', () => {
    state.bills = state.bills.filter((_,i) => i !== idx);
    saveStore(); renderView();
  });
}
function logBillNow(billId, dateStr) {
  const bill = state.bills.find(b => b.id === billId);
  if (!bill) return;
  const d = dateStr || todayStr();
  const mk = d.slice(0,7);
  if (state.expenses.some(e => e.billId===billId && (e.date||'').slice(0,7)===mk)) {
    showToast('Already logged this month! 🌸'); return;
  }
  const ob = checkOverBudget(bill.category, bill.amount, todayStr());
  const doLog = () => {
    addExpense({desc:bill.name, amount:bill.amount, category:bill.category,
      method:'🏦 Transfer', date:d, billId:bill.id});
    showToast('✅ ' + bill.name + ' logged! 🎀'); renderView();
  };
  if (ob.over) openOverBudgetConfirm(bill.category, ob.newTotal, ob.budget, doLog, null);
  else doLog();
}

// ═══════════════════════════════════════════
//  SAVINGS MANAGEMENT
// ═══════════════════════════════════════════
function addSavingsGoal(name, target, deadline, category) {
  state.savings = [...(state.savings||[]), {
    id: Date.now(), name: name.trim(),
    target: parseFloat(target)||0,
    deadline: deadline||'',
    category: category||'💰 Savings',
    saved: 0, note: '',
  }];
  saveStore(); renderView();
}
function updateSavingsGoal(id, key, val) {
  state.savings = (state.savings||[]).map(g =>
    g.id===id ? {...g, [key]: ['target','saved'].includes(key) ? parseFloat(val)||0 : val} : g
  );
  saveStore();
}
function deleteSavingsGoal(id) {
  openConfirm('🗑️ Delete goal?', 'Remove this savings goal?', 'Delete', () => {
    state.savings = (state.savings||[]).filter(g => g.id !== id);
    saveStore(); renderView();
  });
}
function addToSavings(goalId, amount) {
  state.savings = (state.savings||[]).map(g =>
    g.id===goalId ? {...g, saved: (g.saved||0) + parseFloat(amount||0)} : g
  );
  saveStore(); renderView();
}

// ═══════════════════════════════════════════
//  EXPENSE LOGIC
// ═══════════════════════════════════════════
function addExpense(exp) {
  const e = {...exp, id:Date.now()+Math.random(), amount:parseFloat(exp.amount)||0, date:exp.date||todayStr()};
  state.expenses.unshift(e); saveStore(); return e;
}
function deleteExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id); saveStore(); renderView();
}
function editExpense(id) {
  const e = state.expenses.find(x => x.id === id); if (!e) return;
  const cats = getCategories();
  const catOpts = cats.map(c => '<option value="'+c+'"'+(c===e.category?' selected':'')+'>'+c+'</option>').join('');
  const payOpts = PAY.map(p => '<option value="'+p+'"'+(p===e.method?' selected':'')+'>'+p+'</option>').join('');
  openSheet(
    '<div style="font-family:Fredoka,sans-serif;font-size:22px;font-weight:700;margin-bottom:16px">✏️ Edit Expense</div>'
    + '<div class="col">'
    + '<div><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px">Description</div>'
    + '<input type="text" id="edit-desc" value="'+e.desc.replace(/"/g,'&quot;')+'" placeholder="What was this?"/></div>'
    + '<div><div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px">Amount (CHF)</div>'
    + '<input type="number" id="edit-amount" value="'+e.amount+'" step="0.01"/></div>'

function saveEditExpense(id) {
  const desc   = document.getElementById('edit-desc')?.value.trim();
  const amount = parseFloat(document.getElementById('edit-amount')?.value)||0;
  const cat    = document.getElementById('edit-cat')?.value;
  const method = document.getElementById('edit-method')?.value;
  const date   = document.getElementById('edit-date')?.value;
  if (!desc) { showToast('⚠️ Please enter a description!'); return; }
  state.expenses = state.expenses.map(e => e.id===id ? {...e, desc, amount, category:cat, method, date} : e);
  saveStore(); closeSheet(); renderView(); showToast('✅ Expense updated! 🎀');
}
function checkOverBudget(cat, amount, date) {
  const mk = (date||todayStr()).slice(0,7);
  const already = monthExps(mk).reduce((s,e) => e.category===cat ? s+e.amount : s, 0);
  const bud = state.budget[cat] || 0;
  const newTotal = already + parseFloat(amount||0);
  return bud > 0 && newTotal > bud ? {over:true, newTotal, budget:bud, overage:newTotal-bud} : {over:false};
}
function getSmartNudges() {
  if (!state.settings.smartBudget) return [];
  const now = new Date();
  const pmk = monthKey(new Date(now.getFullYear(), now.getMonth()-1, 1));
  const cs = byCat(monthExps(pmk));
  return Object.entries(cs)
    .filter(([cat,spent]) => (state.budget[cat]||0) > 0 && spent > (state.budget[cat]||0))
    .map(([cat,spent]) => ({cat, spent, budget:state.budget[cat], overage:spent-state.budget[cat]}));
}
function bumpBudget(cat, newVal) {
  state.budget[cat] = Math.ceil(newVal); saveStore(); renderView();
  showToast('✅ Budget updated! 🎀');
}

function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const code = `self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.matchAll({type:'window'}).then(cs=>{if(cs.length)cs[0].focus();else clients.openWindow('/')}))});`;
  const url = URL.createObjectURL(new Blob([code], {type:'application/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
async function requestNotifPerm() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  return (await Notification.requestPermission()) === 'granted';
}
function scheduleReminder() {
  if (!state.settings.notificationsOn) return;
  const [h,m] = (state.settings.reminderTime||'21:30').split(':').map(Number);
  const fire = new Date(); fire.setHours(h,m,0,0);
  if (fire <= new Date()) fire.setDate(fire.getDate()+1);
  if (window._rt) clearTimeout(window._rt);
  window._rt = setTimeout(() => {
    const logged = state.expenses.some(e => e.date === todayStr());
    if (Notification.permission === 'granted') {
      const n = new Notification('🌸 Nessie\'s Budget — Daily Check-in', {
        body: logged ? "You've already logged today! Tap to review 💕" : "Hey! Log today's expenses? 🌙 2 minutes max ✨",
        tag:'daily', renotify:true,
      });
      n.onclick = () => { window.focus(); openEOD(); n.close(); };
    }
    scheduleReminder();
  }, fire - new Date());
}

      : '<div style="font-size:12px;color:var(--dim);text-align:center;padding:4px">No bills set up yet — add them in Settings ⚙️</div>')

    + '<select id="bud-month" style="flex:1">' + allMonths().map(m=>'<option value="'+m+'"'+(m===budMk?' selected':'')+'>'+monthLabel(m)+'</option>').join('') + '</select>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">'

      .map(([l,v,col,bg]) => '<div class="card" style="text-align:center;padding:12px 6px;background:'+bg+';border-color:'+col+'44"><div style="font-size:13px;font-weight:800;color:'+col+'">'+v+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px;font-weight:700">'+l+'</div></div>').join('')
    + '</div>';

  // Re-attach budget input listeners after render
  setTimeout(() => {
    document.querySelectorAll('.bud-inp').forEach(inp => inp.addEventListener('change', e => {
      const cat = e.target.dataset.cat, newVal = parseFloat(e.target.value)||0;
      const s = monthExps(budMk).reduce((sum,ex) => ex.category===cat?sum+ex.amount:sum, 0);
      if (s > newVal && newVal > 0) {
        openOverBudgetConfirm(cat, s, newVal,
          () => { state.budget[cat]=newVal; saveStore(); renderView(); },
          () => { e.target.value = state.budget[cat]; }
        );
      } else { state.budget[cat]=newVal; saveStore(); showToast('✅ Budget updated!'); }
    }));
  }, 50);

  return budHeader + alertBox
    + '<div class="card" style="margin-bottom:12px">'
    + '<div class="section-title">🎨 Category Budgets <span style="font-size:12px;color:var(--dim);font-family:\'Nunito\',sans-serif;font-weight:600">tap amount to edit</span></div>'
    + rows + '</div>';
}

function renderOvTable() {
  const el = document.getElementById('ov-table');
  if (!el) return;
  el.innerHTML = ovMode === 'monthly' ? monthlyOvHTML() : yearlyOvHTML();
}
function yearTotals(year) {
  const now = new Date();
  const curYear = now.getFullYear(), curMonth = now.getMonth()+1; // 1-12
  // For the current year, only count up to and including this month
  const maxMonth = +year === curYear ? curMonth : 12;
  const months = Array.from({length:maxMonth},(_,i)=>year+'-'+String(i+1).padStart(2,'0'));
  const inc   = months.reduce((a,mk)=>a+getIncome(mk),0);
  const spent = months.reduce((a,mk)=>a+totalSpent(mk),0);
  return {inc, spent, maxMonth};
}
function monthlyOvHTML() {
  const now = new Date(), curYear = now.getFullYear(), curMonth = now.getMonth()+1;
  const {inc:yi,spent:ys} = yearTotals(String(ovYear));
  let rows = '';
  for (let i=0; i<12; i++) {
    const monthNum = i+1;
    const mk = ovYear+'-'+String(monthNum).padStart(2,'0');
    // Only grey out months that are strictly in the future (not yet reached)
    const isFuture = (+ovYear > curYear) || (+ovYear === curYear && monthNum > curMonth);
    const inc = getIncome(mk), spent = totalSpent(mk), left = inc-spent;
    const hasDat = state.expenses.some(e=>(e.date||'').startsWith(mk));
    const isNow  = mk === monthKey();
    const pct = inc>0?Math.min(100,(spent/inc)*100):0;
    const barC = pct>90?'var(--red)':pct>70?'var(--peach)':'var(--mint)';
    const status = left>500?'✅':left>0?'⚠️':'❌';
    if (isFuture) {
      rows += '<div style="margin-bottom:10px;background:#FAFAFA;border-radius:16px;padding:12px 14px;border:1.5px solid var(--border);opacity:.45">'
        + '<div style="display:flex;justify-content:space-between;align-items:center">'
        + '<span style="font-weight:800;font-size:14px;color:var(--dim)">'+MONTH_NAMES[i]+'</span>'
        + '<span style="font-size:11px;color:var(--dim);font-weight:600">upcoming 🔮</span></div></div>';
      continue;
    }
    rows += '<div style="margin-bottom:10px;background:' + (isNow?'var(--pink-l)':'white') + ';border-radius:16px;padding:14px;border:1.5px solid ' + (isNow?'#FF6EB444':'var(--border)') + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      + '<div><span style="font-weight:800;font-size:14px">' + MONTH_NAMES[i] + (isNow?' <span style="font-size:10px;background:var(--pink);color:white;padding:2px 7px;border-radius:99px">now</span>':'') + '</span>'
      + '<div style="font-size:11px;color:var(--muted);margin-top:2px;font-weight:600">' + (hasDat||isNow ? fmt(spent)+' / '+fmt(inc) : 'No data yet') + '</div></div>'
      + '<div style="text-align:right"><div style="font-weight:800;font-size:15px;color:' + (left>=0?'var(--mint-d)':'var(--red)') + '">' + (hasDat||isNow?fmtR(left):'—') + '</div>'
      + '<div style="font-size:14px">' + (hasDat||isNow?status:'') + '</div></div></div>'
      + (hasDat||isNow
        ? '<div class="bar-track" style="height:6px"><div class="bar-fill" style="width:'+pct+'%;background:'+barC+'"></div></div>'
        : '<div style="height:6px;background:var(--border);border-radius:99px;opacity:.4"></div>')
      + '</div>';
  }
  return '<div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,var(--lav-l),var(--pink-l));border-color:var(--lav)44">'
    + '<div class="section-title" style="margin-bottom:8px">📊 ' + ovYear + (+ovYear === curYear ? ' so far' : ' summary') + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">'
    + [['Income so far',fmt(yi),'var(--sky)'],['Spent so far',fmt(ys),'var(--pink)'],['Saved so far',fmt(yi-ys),yi-ys>=0?'var(--mint-d)':'var(--red)']]
      .map(([l,v,col])=>'<div><div style="font-weight:800;font-size:13px;color:'+col+'">'+v+'</div><div style="font-size:10px;color:var(--muted);font-weight:700;margin-top:2px">'+l+'</div></div>').join('')
    + '</div></div>' + rows;
}
function yearlyOvHTML() {
  const allYears = [...new Set([String(ovYear), ...state.expenses.map(e=>(e.date||'').slice(0,4)).filter(Boolean)])].sort().reverse();
  let allSaved = 0;
  const rows = allYears.map(year => {
    const {inc,spent} = yearTotals(year);
    const saved = inc - spent; allSaved += saved;
    const pct = inc>0?Math.min(100,(spent/inc)*100):0;
    const isNow = +year === new Date().getFullYear();
    const barC = pct>90?'var(--red)':pct>70?'var(--peach)':'var(--mint)';
    const yearExps = state.expenses.filter(e=>(e.date||'').startsWith(year));
    const cs = byCat(yearExps);
    const top = Object.entries(cs).sort((a,b)=>b[1]-a[1])[0];
    return '<div style="margin-bottom:12px;background:' + (isNow?'var(--lav-l)':'white') + ';border-radius:18px;padding:16px;border:1.5px solid ' + (isNow?'#A78BFA44':'var(--border)') + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      + '<div><div style="font-family:\'Fredoka\',sans-serif;font-size:22px;font-weight:700">' + year + (isNow?' <span style="font-size:11px;background:var(--lav);color:white;padding:2px 8px;border-radius:99px">current</span>':'') + '</div>'
      + (top ? '<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:2px">Top: '+top[0]+' ('+fmt(top[1])+')</div>' : '') + '</div>'
      + '<div style="text-align:right"><div style="font-weight:800;color:' + (saved>=0?'var(--mint-d)':'var(--red)') + ';font-size:16px">' + fmtR(saved) + '</div>'
      + '<div style="font-size:11px;color:var(--muted);font-weight:700">saved</div></div></div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'
      + '<div style="background:var(--sky-l);border-radius:12px;padding:10px;text-align:center"><div style="font-weight:800;color:var(--sky);font-size:13px">'+fmt(inc)+'</div><div style="font-size:10px;color:var(--muted);font-weight:700">Income</div></div>'
      + '<div style="background:var(--pink-l);border-radius:12px;padding:10px;text-align:center"><div style="font-weight:800;color:var(--pink);font-size:13px">'+fmt(spent)+'</div><div style="font-size:10px;color:var(--muted);font-weight:700">Spent</div></div></div>'
      + '<div class="bar-track" style="height:8px"><div class="bar-fill" style="width:'+pct+'%;background:'+barC+'"></div></div>'
      + '<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:5px;text-align:right">'+pct.toFixed(0)+'% of income spent</div></div>';
  }).join('');
  return '<div class="card" style="background:linear-gradient(135deg,#EDE9FE,#FFE0F3);border-color:var(--lav)44;margin-bottom:14px;text-align:center;padding:20px">'
    + '<div style="font-family:\'Fredoka\',sans-serif;font-size:16px;color:var(--muted);margin-bottom:4px">All-time saved</div>'
    + '<div class="big-num" style="color:var(--lav)">' + fmtR(allSaved) + '</div></div>' + rows;
}

function debtHTML() {
  const d = state.debt, ccPmt = (+d.ccMin||0);
  let ccMo = '—', ccInt = '—';
  if ((+d.ccBalance||0) > 0 && ccPmt > 0) {
    const r = 0.18/12, bal = +d.ccBalance;
    const raw = -Math.log(1 - r*bal/ccPmt)/Math.log(1+r);
    if (!isNaN(raw) && isFinite(raw)) { ccMo = Math.ceil(raw); ccInt = fmt((ccPmt*ccMo - bal).toFixed(0)); }
  }
  const mkDebt = inp => inp.map(([l,k,col,def]) =>
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1.5px solid var(--border)">'
    + '<span style="color:var(--muted);font-size:14px;font-weight:600">' + l + '</span>'
    + '<input type="number" class="debt-inp" data-key="' + k + '" value="' + (d[k]!==undefined?d[k]:(def||0)) + '"'
    + ' style="width:90px;text-align:right;color:' + col + ';font-size:14px;font-weight:800;border-radius:10px" onchange="state.debt[this.dataset.key]=parseFloat(this.value)||0;saveStore();renderView()"/></div>'
  ).join('');

  return '<div class="card" style="border-color:var(--lav)44;margin-bottom:12px">'
    + '<div class="section-title" style="color:var(--lav)">💜 Credit Card</div>'
    + mkDebt([['Current Balance (CHF)','ccBalance','var(--red)',null],['Minimum payment/mo','ccMin','var(--muted)',0]])
    + '<div style="margin-top:14px;padding:14px;background:var(--lav-l);border-radius:14px;border:1.5px solid #A78BFA33">'
    + [['Monthly payment',fmt(ccPmt),'var(--lav)'],['Payoff in',ccMo==='—'?'—':ccMo+' months','var(--lav)'],['Est. interest',ccInt,'var(--red)']]
      .map(([l,v,col])=>'<div style="display:flex;justify-content:space-between;margin-bottom:7px"><span style="color:var(--muted);font-size:13px;font-weight:600">'+l+'</span><span style="font-weight:800;color:'+col+'">'+v+'</span></div>').join('')
    + '</div></div>'
    + (()=>{
        const loanRemaining = (+d.loanMonthly||0) * (+d.loanMonths||0);
        const loanTotal = (+d.loanTotal||0) || loanRemaining;
        const loanPct = loanTotal > 0 ? Math.max(0, Math.min(100, (1 - loanRemaining/loanTotal)*100)) : 0;
        const loanPaid = loanTotal - loanRemaining;
        const payoffDate = (() => {
          const mo = +d.loanMonths||0;
          if (!mo) return '🎉 Paid off!';
          const dt = new Date(); dt.setMonth(dt.getMonth() + mo);
          return dt.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
        })();
        const loanPayments = state.expenses
          .filter(e => e.loanPayment)
          .sort((a,b) => (b.date||'').localeCompare(a.date||''))
          .slice(0,5);
        const histHTML = loanPayments.length === 0
          ? '<div style="font-size:12px;color:var(--dim);text-align:center;padding:8px 0">No payments logged yet 🌸</div>'
          : loanPayments.map(e =>
              '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1.5px solid #38BDF822">'
              + '<div><div style="font-size:13px;font-weight:700">'+e.desc+'</div>'

          + (loanTotal > 0 ? '<div class="bar-track" style="height:10px;margin-bottom:6px"><div class="bar-fill" style="width:'+loanPct+'%;background:var(--sky)"></div></div>'
            + '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:10px"><span>CHF '+Math.round(loanPaid)+' paid</span><span>'+Math.round(loanPct)+'% done</span></div>' : '')
          + [['Months remaining', (+d.loanMonths||0)+' months', 'var(--sky)'],['Payoff date 🎯', payoffDate, 'var(--sky)']]
            .map(([l,v,col])=>'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--muted);font-size:13px;font-weight:600">'+l+'</span><span style="font-weight:800;color:'+col+'">'+v+'</span></div>').join('')
          + '</div>'
          + '<div style="margin-top:14px">'
          + '<div style="font-size:12px;font-weight:800;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Recent Payments</div>'
          + histHTML
          + '</div>'
          + '</div>';
      })()
    + buildIOUSection()
    + '<div class="card" style="background:var(--mint-l);border-color:var(--mint)44">'
    + '<div style="font-weight:800;color:var(--mint-d);margin-bottom:10px;font-size:15px">🧠 Your Strategy 💪</div>'

function openLoanPayment() {
  const d = state.debt;
  const html = [
    '<div style="font-family:Fredoka,sans-serif;font-size:22px;font-weight:700;margin-bottom:4px">💳 Log Loan Payment</div>',

    '<div style="display:flex;gap:8px">',
    '<input id="lp-amt" type="number" placeholder="Amount (CHF)" value="'+(d.loanMonthly||'')+'" style="flex:1"/>',
    '<input id="lp-date" type="date" value="'+todayStr()+'" style="flex:1"/>',
    '</div>',
    '<select id="lp-method">'+PAY.map(p=>'<option value="'+p+'">'+p+'</option>').join('')+'</select>',
    '<button class="btn btn-sky" id="lp-save" style="width:100%;padding:13px;margin-top:4px;background:var(--sky);color:white;box-shadow:0 4px 14px #38BDF840;border:none;border-radius:14px;font-size:14px;font-weight:800;font-family:Nunito,sans-serif;cursor:pointer">Save 💾</button>',
    '<button class="btn btn-ghost" id="lp-cancel" style="width:100%;padding:12px">Cancel</button>',
    '</div>'
  ].join('');
  openSheet(html);
  setTimeout(() => {
    document.getElementById('lp-save')?.addEventListener('click', () => {
      const desc   = document.getElementById('lp-desc')?.value?.trim() || (d.loanName||'Loan')+' payment';
      const amount = parseFloat(document.getElementById('lp-amt')?.value) || 0;
      const date   = document.getElementById('lp-date')?.value || todayStr();
      const method = document.getElementById('lp-method')?.value || PAY[0];
      if (!amount) { showToast('Enter an amount! 🌸'); return; }
      state.debt.loanMonths = Math.max(0, (+state.debt.loanMonths||0) - 1);
      addExpense({desc, amount, date, category:'💳 Debt Payments', method, loanPayment: true});
      saveStore(); closeSheet(); showToast('💳 Loan payment logged! 💪'); renderView();
    });
    document.getElementById('lp-cancel')?.addEventListener('click', closeSheet);
  }, 10);
}

  } else if (_qaType==='savings') {

      : '<div style="font-size:13px;color:var(--dim);padding:12px;text-align:center">No savings goals yet — create one in 💰 tab!</div>';
  }

  const descPh = _qaType==='income'?'Description...':_qaType==='debt'?'Payment note (optional)':_qaType==='savings'?'Note (optional)':'What did you buy? 🛍️';
  const amtDate = needsAmt
    ? ('<input id="qa-desc" placeholder="'+descPh+'"/>'+
       '<div style="display:flex;gap:8px"><input id="qa-amt" type="number" placeholder="Amount (CHF)" style="flex:1"/><input id="qa-date" type="date" value="'+todayStr()+'" style="flex:1"/></div>')
    : '<input id="qa-date" type="date" value="'+todayStr()+'"/>';

    '<button class="btn btn-pink" id="qa-submit-btn" style="width:100%;padding:13px;margin-top:4px">Save 💾</button>',

    '</div>'
  ].join('');

    document.querySelectorAll('.qatype-btn').forEach(btn => {
      btn.addEventListener('click', () => setQAType(btn.dataset.qatype));

    document.getElementById('qa-cancel-btn')?.addEventListener('click', closeSheet);
  }, 10);

function setQAType(type) { _qaType = type; _buildQASheet(); }
function submitQA() {
  const date   = document.getElementById('qa-date')?.value || todayStr();
  const method = document.getElementById('qa-pay')?.value || PAY[0];
  if (_qaType === 'spending') {
    const desc=document.getElementById('qa-desc')?.value?.trim();
    const amount=document.getElementById('qa-amt')?.value;
    const cat=document.getElementById('qa-cat')?.value;
    if (!desc||!amount) { showToast('Fill in description and amount! 🌸'); return; }
    const ob=checkOverBudget(cat,amount,date);
    const doAdd=()=>{ addExpense({desc,amount,date,category:cat,method}); closeSheet(); showToast('✅ Saved! 🎀'); renderView(); };
    if (ob.over) openOverBudgetConfirm(cat,ob.newTotal,ob.budget,doAdd,null);
    else doAdd();
  } else if (_qaType === 'income') {
    const amount=parseFloat(document.getElementById('qa-amt')?.value)||0;
    const incType=document.getElementById('qa-inc-type')?.value||'other';
    if (!amount) { showToast('Enter an amount! 🌸'); return; }
    const mk=date.slice(0,7);
    state.income[mk]={...(state.income[mk]||{}),[incType]:(state.income[mk]?.[incType]||0)+amount};
    saveStore(); closeSheet(); showToast('💼 Income added! 🎀'); renderView();
  } else if (_qaType === 'bill') {
    const billId=parseInt(document.getElementById('qa-bill-id')?.value);
    if (!billId) { showToast('Select a bill! 🌸'); return; }
    const bill=state.bills.find(b=>b.id===billId);
    if (!bill) return;
    const mk=date.slice(0,7);
    if (state.expenses.some(e=>e.billId===billId&&(e.date||'').slice(0,7)===mk)) { showToast('Already logged this bill this month! 🌸'); return; }
    addExpense({desc:bill.name,amount:bill.amount,date,category:bill.category,method,billId:bill.id});
    closeSheet(); showToast('✅ '+bill.name+' logged! 🎀'); renderView();
  } else if (_qaType === 'debt') {
    const desc=document.getElementById('qa-desc')?.value?.trim()||'Debt payment';
    const amount=parseFloat(document.getElementById('qa-amt')?.value)||0;
    const debtType=document.getElementById('qa-debt-type')?.value;
    if (!amount) { showToast('Enter an amount! 🌸'); return; }
    if (debtType==='cc') state.debt.ccBalance=Math.max(0,(state.debt.ccBalance||0)-amount);
    else if (debtType==='loan') state.debt.loanMonths=Math.max(0,(state.debt.loanMonths||0)-1);
    addExpense({desc,amount,date,category:'💳 Debt Payments',method});
    saveStore(); closeSheet(); showToast('💳 Payment logged! 💪'); renderView();
  } else if (_qaType === 'savings') {
    const goalId=parseInt(document.getElementById('qa-sav-id')?.value);
    const amount=parseFloat(document.getElementById('qa-amt')?.value)||0;
    const desc=document.getElementById('qa-desc')?.value?.trim();
    if (!goalId||!amount) { showToast('Select goal and enter amount! 🌸'); return; }
    const g=(state.savings||[]).find(g=>g.id===goalId);
    if (!g) return;
    addToSavings(goalId,amount);
    addExpense({desc:desc||('Savings: '+g.name),amount,date,category:g.category||'💰 Savings',method});
    closeSheet(); showToast('🌱 Saved! 💕'); renderView();
  }
}

    + '</div>' + bars + '<button class="btn btn-ghost" onclick="closeSheet()" style="width:100%;margin-top:8px">Close 💕</button>');
}

// Generic confirm
function openConfirm(title, body, confirmLabel, onConfirm, onCancel, cancelLabel='Cancel') {
  openSheet('<div style="font-family:\'Fredoka\',sans-serif;font-size:22px;font-weight:700;margin-bottom:10px">'+title+'</div>'
    + '<div style="color:var(--muted);font-size:14px;font-weight:600;line-height:1.6;margin-bottom:22px">'+body+'</div>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="btn btn-pink" onclick="cfYes()" style="flex:1;padding:13px">'+confirmLabel+'</button>'
    + '<button class="btn btn-ghost" onclick="cfNo()" style="flex:1;padding:13px">'+cancelLabel+'</button></div>');
  window._cfCb = {yes:onConfirm||closeSheet, no:onCancel||closeSheet};
}
function cfYes() { const c=window._cfCb; closeSheet(); c.yes?.(); }
function cfNo()  { const c=window._cfCb; closeSheet(); c.no?.(); }

window._deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); window._deferredPrompt=e; });
function installPWA() {
  if (!window._deferredPrompt) return;
  window._deferredPrompt.prompt();
  window._deferredPrompt.userChoice.then(r => { if(r.outcome==='accepted') showToast('🎉 Nessie\'s Budget installed! 🌸'); window._deferredPrompt=null; });
}
function injectManifest() {
  const m = {name:'Nessie\'s Budget 🌸',short_name:'Nessie\'s Budget',description:'Cute ADHD budget tracker',start_url:'.',display:'standalone',background_color:'#FFF5FB',theme_color:'#FFF0F8',orientation:'portrait',
    icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="48" fill="%23FFE0F3"/><text y="140" x="20" font-size="130">🌸</text></svg>',sizes:'192x192',type:'image/svg+xml'}]};
  const url=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));

//  INIT
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
//  WALLET & IOU HELPERS
// ═══════════════════════════════════════════
function walletBalance(type) {
  // Start from set balance, subtract expenses by payment method
  const base = state.wallet[type] || 0;
  const methodMap = {bank: ['🏦 Transfer'], cash: ['💵 Cash']};
  const methods = methodMap[type] || [];
  const mk = monthKey();
  const spent = state.expenses
    .filter(e => methods.includes(e.method) && (e.date||'').slice(0,7) === mk)
    .reduce((s,e) => s + e.amount, 0);
  // Also add income logged this month if bank
  const inc = type === 'bank' ? getIncome(mk) : 0;
  return base + inc - spent;
}

function addIOU(direction, name, amount, reason) {
  state.ious = [...(state.ious||[]), {
    id: Date.now(), direction, name: name.trim(),
    amount: parseFloat(amount)||0, reason: reason.trim(),
    date: todayStr(), settled: false
  }];
  saveStore(); renderView();
}
function settleIOU(id) {
  state.ious = state.ious.map(i => i.id===id ? {...i, settled:true, settledDate:todayStr()} : i);
  saveStore(); renderView();
  showToast('✅ Marked as settled! 🎀');
}
function openPayIOU(id) {
  const iou = (state.ious||[]).find(i => i.id===id);
  if (!iou) return;
  const isOwe = iou.direction === 'owe';
  const d = document.createElement('div');
  d.innerHTML = [
    '<div style="font-family:Fredoka,sans-serif;font-size:22px;font-weight:700;margin-bottom:4px">'+(isOwe?'💸 Log a payment':'💰 Record received')+'</div>',
    '<div style="color:var(--dim);font-size:13px;font-weight:600;margin-bottom:4px">'+iou.name+' · '+iou.reason+'</div>',
    '<div style="font-family:Fredoka,sans-serif;font-size:17px;font-weight:700;color:var(--red);margin-bottom:18px">Remaining: '+fmt(iou.amount)+'</div>',
    '<div class="col">',
    '<input id="iou-pay-amt" type="number" placeholder="Amount paid (CHF)"/>',
    '<select id="iou-pay-method">'+PAY.map(p=>'<option value="'+p+'">'+p+'</option>').join('')+'</select>',
    '<div style="display:flex;gap:8px;margin-top:4px">',
    '<button class="btn btn-mint" id="iou-pay-btn" style="flex:1;padding:13px">'+(isOwe?'Pay 💸':'Received 🙌')+'</button>',
    '<button class="btn btn-ghost" id="iou-pay-cancel" style="flex:1;padding:12px">Cancel</button>',
    '</div></div>'
  ].join('');
  openSheet(d.innerHTML);
  setTimeout(() => {
    document.getElementById('iou-pay-btn')?.addEventListener('click', () => {
      const amt = parseFloat(document.getElementById('iou-pay-amt')?.value)||0;
      const method = document.getElementById('iou-pay-method')?.value || PAY[0];
      if (!amt) { showToast('Enter an amount! 🌸'); return; }
      const newAmt = iou.amount - amt;
      if (newAmt <= 0) {
        // Fully paid — settle it
        state.ious = state.ious.map(i => i.id===id ? {...i, amount:0, settled:true, settledDate:todayStr()} : i);
        showToast('🎉 Fully settled! 💕');
      } else {
        // Partial payment — reduce balance
        state.ious = state.ious.map(i => i.id===id ? {...i, amount:newAmt} : i);
        showToast('✅ Payment logged! Remaining: '+fmt(newAmt));
      }
      if (isOwe) {
        // Log as expense in debt payments
        addExpense({desc:'IOU payment to '+iou.name, amount:amt, date:todayStr(), category:'💳 Debt Payments', method});
      }
      saveStore(); closeSheet(); renderView();
    });
    document.getElementById('iou-pay-cancel')?.addEventListener('click', closeSheet);
  }, 10);
}
function deleteIOU(id) {
  openConfirm('🗑️ Delete this entry?', 'Remove this IOU from your tracker?', 'Delete', () => {
    state.ious = state.ious.filter(i => i.id !== id);
    saveStore(); renderView();
  });
}
function openAddIOU() {
  window._iouDir = 'owe';
  const html = [
    '<div style="font-family:Fredoka,sans-serif;font-size:22px;font-weight:700;margin-bottom:18px">🤝 Add IOU</div>',
    '<div class="col">',
    '<div style="display:flex;gap:8px">',
    '<button id="iou-dir-owe" class="btn btn-pink" style="flex:1;padding:10px;font-size:13px">I owe them 💸</button>',
    '<button id="iou-dir-get" class="btn btn-ghost" style="flex:1;padding:10px;font-size:13px">They owe me 🙌</button>',
    '</div>',
    '<input id="iou-name" placeholder="Their name 👤"/>',
    '<input id="iou-amount" type="number" placeholder="Amount (CHF)"/>',
    '<input id="iou-reason" placeholder="What for? (e.g. dinner, rent...)"/>',
    '<div style="display:flex;gap:8px;margin-top:4px">',
    '<button class="btn btn-pink" id="iou-submit-btn" style="flex:1;padding:13px">Add 💾</button>',
    '<button class="btn btn-ghost" id="iou-cancel-btn" style="flex:1;padding:13px">Cancel</button>',
    '</div></div>'
  ].join('');
  openSheet(html);
  setTimeout(() => {
    document.getElementById('iou-dir-owe')?.addEventListener('click', () => setIOUDir('owe'));
    document.getElementById('iou-dir-get')?.addEventListener('click', () => setIOUDir('get'));
    document.getElementById('iou-submit-btn')?.addEventListener('click', submitIOU);
    document.getElementById('iou-cancel-btn')?.addEventListener('click', closeSheet);
  }, 10);
}
function setIOUDir(dir) {
  window._iouDir = dir;
  const oweBtn = document.getElementById('iou-dir-owe');
  const getBtn = document.getElementById('iou-dir-get');
  if (!oweBtn || !getBtn) return;
  if (dir === 'owe') {
    oweBtn.className='btn btn-pink'; getBtn.className='btn btn-ghost';
  } else {
    oweBtn.className='btn btn-ghost'; getBtn.className='btn btn-mint';
  }
}
function submitIOU() {
  const name   = document.getElementById('iou-name')?.value;
  const amount = document.getElementById('iou-amount')?.value;
  const reason = document.getElementById('iou-reason')?.value;
  if (!name || !amount) { showToast('Fill in name and amount! 🌸'); return; }
  addIOU(window._iouDir||'owe', name, amount, reason||'');
  closeSheet(); showToast('✅ IOU added! 🤝');
}

function buildIOUSection() {
  const active   = (state.ious||[]).filter(i => !i.settled);
  const settled  = (state.ious||[]).filter(i => i.settled);
  const iOwe     = active.filter(i => i.direction==='owe');
  const theyOwe  = active.filter(i => i.direction==='get');
  const totalOwe = iOwe.reduce((s,i) => s+i.amount, 0);
  const totalGet = theyOwe.reduce((s,i) => s+i.amount, 0);

  const renderIOU = (iou) =>
    '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1.5px solid var(--border)">'
    + '<div style="width:36px;height:36px;border-radius:12px;background:'+(iou.direction==='owe'?'var(--red-l)':'var(--mint-l)')+';display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'
    + (iou.direction==='owe'?'💸':'🙌') + '</div>'
    + '<div style="flex:1;min-width:0">'
    + '<div style="font-weight:800;font-size:14px">' + iou.name + '</div>'
    + (iou.reason ? '<div style="font-size:12px;color:var(--muted);margin-top:1px">' + iou.reason + '</div>' : '')
    + '<div style="font-size:11px;color:var(--dim);margin-top:2px">' + iou.date + '</div></div>'
    + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">'
    + '<span style="font-weight:800;font-size:14px;color:'+(iou.direction==='owe'?'var(--red)':'var(--mint-d)')+'">'+fmt(iou.amount)+'</span>'
    + '<div style="display:flex;gap:5px">'
    + '<button onclick="openPayIOU('+iou.id+')" style="background:var(--sky-l);border:1.5px solid #38BDF844;border-radius:8px;color:var(--sky);font-size:11px;font-weight:800;padding:3px 8px;cursor:pointer">💳 Pay</button>'
    + '<button onclick="settleIOU('+iou.id+')" style="background:var(--mint-l);border:1.5px solid #3DD9A444;border-radius:8px;color:var(--mint-d);font-size:11px;font-weight:800;padding:3px 8px;cursor:pointer">✓ Done</button>'
    + '<button onclick="deleteIOU('+iou.id+')" style="background:var(--red-l);border:1.5px solid #F8717133;border-radius:8px;color:var(--red);font-size:11px;font-weight:800;padding:3px 8px;cursor:pointer">×</button>'
    + '</div></div></div>';

  let html = '<div class="card" style="margin-bottom:12px;border-color:var(--peach)44">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    + '<div class="section-title" style="margin-bottom:0;color:var(--peach)">🤝 Personal IOUs</div>'
    + '<button class="btn btn-peach" onclick="openAddIOU()" style="padding:7px 14px;font-size:12px;border-radius:10px">+ Add</button></div>';

  if (active.length === 0) {
    html += '<div class="empty" style="padding:16px 0">No active IOUs! All clear 🎉</div>';
  } else {
    if (iOwe.length > 0) {
      html += '<div style="font-size:12px;font-weight:800;color:var(--red);letter-spacing:.6px;margin-bottom:4px;text-transform:uppercase">I owe · ' + fmt(totalOwe) + '</div>';
      html += iOwe.map(renderIOU).join('');
    }
    if (theyOwe.length > 0) {
      html += '<div style="font-size:12px;font-weight:800;color:var(--mint-d);letter-spacing:.6px;margin:'+(iOwe.length>0?'14px':'0')+'px 0 4px;text-transform:uppercase">They owe me · ' + fmt(totalGet) + '</div>';
      html += theyOwe.map(renderIOU).join('');
    }
  }

  if (settled.length > 0) {
    html += '<div style="margin-top:14px"><div style="font-size:12px;font-weight:800;color:var(--dim);letter-spacing:.6px;margin-bottom:8px;text-transform:uppercase">✓ Settled (' + settled.length + ')</div>';
    html += settled.slice(-3).reverse().map(i =>
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;opacity:.6">'
      + '<div><span style="font-size:13px;font-weight:700">' + i.name + '</span>'
      + (i.reason?'<span style="font-size:12px;color:var(--dim)"> · '+i.reason+'</span>':'')
      + '</div><div style="display:flex;align-items:center;gap:8px">'
      + '<span style="font-size:13px;font-weight:800;color:var(--dim)">'+fmt(i.amount)+'</span>'
      + '<button onclick="deleteIOU('+i.id+')" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px">×</button>'
      + '</div></div>'
    ).join('') + '</div>';
  }
  html += '</div>';
  return html;
}

// ═══════════════════════════════════════════
//  EXPORT / IMPORT / BACKUP
// buildBackupNudge is a helper to avoid inline ternary quote issues
function buildWalletCard() {
  const mk = monthKey();
  const bankBase = state.wallet.bank || 0;
  const cashBase = state.wallet.cash || 0;
  const ccBase   = state.wallet.cc   || 0; // cc: positive = available credit, negative = you owe
  // Subtract expenses by payment method this month
  const bankSpent = state.expenses.filter(e => ['🏦 Transfer'].includes(e.method) && (e.date||'').slice(0,7)===mk).reduce((s,e)=>s+e.amount,0);
  const cashSpent = state.expenses.filter(e => e.method==='💵 Cash' && (e.date||'').slice(0,7)===mk).reduce((s,e)=>s+e.amount,0);
  const ccSpent   = state.expenses.filter(e => e.method==='💳 Card' && (e.date||'').slice(0,7)===mk).reduce((s,e)=>s+e.amount,0);
  const bankNow = bankBase - bankSpent;
  const cashNow = cashBase - cashSpent;
  const ccNow   = ccBase - ccSpent; // goes negative when overspent — that's fine!

  const accounts = [
    {emoji:'🏦', label:'Bank',   val:bankNow, border:'#38BDF844', zeroMsg:'Set balance'},
    {emoji:'💵', label:'Cash',   val:cashNow, border:'#3DD9A444', zeroMsg:'Set balance'},
    {emoji:'💳', label:'Card',   val:ccNow,   border:'#A78BFA44', zeroMsg:'Set balance', allowNeg:true},
  ];
  const allZero = bankBase===0 && cashBase===0 && ccBase===0;

  return '<div class="card" style="margin-bottom:12px;background:linear-gradient(135deg,var(--sky-l),var(--mint-l));border-color:var(--sky)44">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    + '<div class="section-title" style="margin-bottom:0">💰 My Wallet</div>'
    + '<button onclick="openWalletEdit()" style="background:none;border:none;color:var(--sky);font-size:12px;font-weight:800;cursor:pointer;padding:4px 8px">Edit ✏️</button></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'
    + accounts.map(a => {
        const col = a.val < 0 ? 'var(--red)' : a.label==='Bank'?'var(--sky)':a.label==='Cash'?'var(--mint-d)':'var(--lav)';
        return '<div style="background:white;border-radius:14px;padding:11px 8px;text-align:center;border:1.5px solid '+a.border+'">'
          + '<div style="font-size:18px;margin-bottom:3px">'+a.emoji+'</div>'
          + '<div style="font-family:Fredoka,sans-serif;font-size:16px;font-weight:700;color:'+col+'">'+fmtR(a.val)+'</div>'
          + '<div style="font-size:10px;color:var(--muted);font-weight:700;margin-top:1px">'+a.label+'</div>'
          + (a.val < 0 ? '<div style="font-size:9px;color:var(--red);font-weight:700;margin-top:1px">in debt</div>' : '')
          + '</div>';
      }).join('')
    + '</div>'
    + (allZero ? '<div style="font-size:12px;color:var(--dim);font-weight:600;margin-top:10px;text-align:center">Tap Edit to set your starting balances 🌸</div>' : '')
    + '</div>';
}

function openWalletEdit() {
  const fields = [
    ['🏦 Bank account (CHF)',  'bank', 'var(--sky)',   'How much is in your bank right now'],
    ['💵 Cash wallet (CHF)',   'cash', 'var(--mint-d)','How much cash you have on you'],
    ['💳 Credit card (CHF)',   'cc',   'var(--lav)',   'Your available balance — use negative if already in debt (e.g. -450)'],

    + '<input type="number" id="wallet-'+k+'" value="'+(state.wallet[k]||0)+'"'
    + ' style="width:110px;text-align:right;font-size:15px;font-weight:800;color:'+col+';border-radius:10px"/></div>'
    + '<div style="font-size:11px;color:var(--dim);font-weight:600;margin-top:3px">'+hint+'</div></div>'
  ).join('');
  openSheet(
    '<div style="font-family:Fredoka,sans-serif;font-size:22px;font-weight:700;margin-bottom:6px">💰 My Wallet</div>'

    + '<div class="col">' + rows
    + '<div style="font-size:12px;color:var(--dim);font-weight:600;padding:6px 0;line-height:1.6">💡 Set these to what you have <b>right now</b>. They update as you log expenses each month.</div>'
    + '<button class="btn btn-mint" onclick="saveWallet()" style="width:100%;padding:13px;margin-top:4px">Save 💾</button>'
    + '<button class="btn btn-ghost" onclick="closeSheet()" style="width:100%;padding:12px">Cancel</button>'
    + '</div>'
  );
}
function saveWallet() {
  const bank = parseFloat(document.getElementById('wallet-bank')?.value)||0;
  const cash = parseFloat(document.getElementById('wallet-cash')?.value)||0;
  const cc   = parseFloat(document.getElementById('wallet-cc')?.value)||0;
  state.wallet = {bank, cash, cc};
  saveStore(); closeSheet(); renderView();
  showToast('✅ Wallet updated! 💰');
}

function buildBackupNudge() {
  if (!shouldShowBackupNudge()) return '';
  const days = backupDaysAgo();
  const msg = days === null
    ? "You haven't backed up yet — protect your data! 🌸"
    : "Last backup was " + days + " days ago";
  return '<div style="background:var(--sky-l);border:1.5px solid #38BDF844;border-radius:18px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">'
    + '<div><div style="font-size:14px;font-weight:800;color:var(--sky)">💾 Time to back up!</div>'
    + '<div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:2px">' + msg + '</div></div>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="btn btn-mint" onclick="exportData()" style="padding:7px 12px;font-size:12px;border-radius:10px">Back up 💾</button>'
    + '<button onclick="dismissBackupNudge()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px">×</button>'
    + '</div></div>';
}
// ═══════════════════════════════════════════
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = 'budgetbrain-backup-' + date + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  state.lastBackup = todayStr(); saveStore();
  showToast('✅ Backup saved! 🎀'); renderView();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported.expenses || !imported.budget) { showToast('⚠️ Invalid backup file!'); return; }
        openConfirm('📥 Import backup?',
          'This will replace ALL current data with the backup. Are you sure?',
          'Yes, import!', () => {
            Object.assign(state, imported);
            if (state.catColors) CAT_COLORS = {...DEFAULT_CAT_COLORS, ...state.catColors};
            saveStore(); showToast('✅ Data imported! 🎀'); setView('dashboard');
          });
      } catch(e) { showToast('⚠️ Could not read file!'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input); input.click(); document.body.removeChild(input);
}

function backupDaysAgo() {
  if (!state.lastBackup) return null;
  const diff = new Date(todayStr()) - new Date(state.lastBackup);
  return Math.floor(diff / (1000*60*60*24));
}

function shouldShowBackupNudge() {
  const days = backupDaysAgo();
  // Show if never backed up and has expenses, or backed up 14+ days ago
  if (state.expenses.length === 0) return false;
  if (days === null) return true;
  return days >= 14;
}

function dismissBackupNudge() {
  // Snooze for 3 days without actually backing up
  state.lastBackup = new Date(Date.now() - 11*24*60*60*1000).toISOString().slice(0,10);
  saveStore(); renderView();
}

function init() {
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  injectManifest();
  registerSW();
  if (state.settings.notificationsOn) scheduleReminder();
  const [rh,rm] = (state.settings.reminderTime||'21:30').split(':').map(Number);
  const now = new Date(), past = now.getHours()>rh || (now.getHours()===rh && now.getMinutes()>=rm);
  if (state.lastPrompt !== todayStr() && past) setTimeout(() => openEOD(), 1500);
  setView('dashboard');
}
init();
